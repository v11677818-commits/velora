<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velora Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
color:white;
height:100vh;
overflow:hidden;
}

/* APP */

.app{
width:100%;
height:100vh;
position:relative;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-320px;
width:320px;
height:100vh;
background:#0b0b0b;
border-right:1px solid #1f1f1f;
padding:100px 28px;
transition:.35s;
z-index:999;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
text-decoration:none;
color:white;
font-size:20px;
margin-bottom:34px;
font-weight:500;
}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
backdrop-filter:blur(4px);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:998;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* TOPBAR */

.topbar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.menu-btn{
width:54px;
height:54px;
border-radius:50%;
background:#151515;
border:1px solid #2b2b2b;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
cursor:pointer;
transition:.3s;
}

.menu-btn:hover{
background:#1d1d1d;
}

.edit-btn{
padding:14px 24px;
border-radius:999px;
background:#141414;
border:1px solid #2b2b2b;
font-size:14px;
cursor:pointer;
}

/* MAIN */

.main{
width:100%;
height:100vh;
overflow-y:auto;
padding:
120px 20px
40px;
}

/* CONTAINER */

.container{
max-width:760px;
margin:auto;
position:relative;
}

/* GLOW */

.glow{
position:absolute;
top:-200px;
left:50%;
transform:translateX(-50%);
width:700px;
height:700px;
background:
radial-gradient(
circle,
rgba(255,255,255,.06),
transparent
);
filter:blur(100px);
pointer-events:none;
}

/* PROFILE CARD */

.profile-card{
position:relative;
z-index:2;
background:#101010;
border:1px solid #242424;
border-radius:42px;
padding:34px 28px;
overflow:hidden;
}

/* HEADER */

.profile-header{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

/* AVATAR */

.avatar-wrap{
position:relative;
margin-bottom:18px;
}

.avatar-glow{
position:absolute;
inset:-8px;
border-radius:50%;
background:
radial-gradient(
circle,
rgba(255,255,255,.22),
transparent
);
filter:blur(18px);
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #2f2f2f;
position:relative;
z-index:2;
}

/* NAME */

.name{
font-size:30px;
font-weight:700;
margin-bottom:8px;
}

.username{
font-size:15px;
color:#a8a8a8;
margin-bottom:18px;
}

/* VIP */

.vip{
padding:12px 18px;
border-radius:999px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
font-size:13px;
backdrop-filter:blur(10px);
margin-bottom:30px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:
repeat(4,1fr);
gap:14px;
margin-bottom:34px;
}

.stat-box{
background:#151515;
border:1px solid #242424;
border-radius:26px;
padding:22px 10px;
text-align:center;
}

.stat-number{
font-size:24px;
font-weight:700;
margin-bottom:8px;
}

.stat-label{
font-size:13px;
color:#a7a7a7;
}

/* TABS */

.tabs{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:10px;
margin-bottom:28px;
}

.tabs::-webkit-scrollbar{
display:none;
}

.tab{
min-width:max-content;
padding:14px 22px;
border-radius:999px;
background:#161616;
border:1px solid #292929;
font-size:14px;
cursor:pointer;
transition:.2s;
}

.tab.active{
background:white;
color:black;
}

/* CONTENT */

.content-box{
background:#151515;
border:1px solid #242424;
border-radius:30px;
padding:24px;
min-height:280px;
}

/* ITEMS */

.item-grid{
display:grid;
grid-template-columns:
repeat(2,1fr);
gap:16px;
}

.item{
background:#101010;
border:1px solid #242424;
border-radius:24px;
padding:14px;
text-align:center;
}

.item img{
width:100%;
height:150px;
object-fit:contain;
margin-bottom:12px;
filter:
drop-shadow(0 0 20px rgba(255,255,255,.1));
}

.item-name{
font-size:14px;
}

/* MOBILE */

@media(max-width:768px){

.sidebar{
width:280px;
}

.profile-card{
padding:28px 20px;
border-radius:32px;
}

.avatar{
width:100px;
height:100px;
}

.name{
font-size:24px;
}

.stats{
grid-template-columns:
repeat(2,1fr);
}

.stat-box{
padding:18px 10px;
}

.item img{
height:120px;
}

}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<a href="group.html">Group</a>

<a href="chat.html">Bot</a>

<a href="game.html">Velora Game</a>

<a href="outfits.html">Outfits</a>

<a href="challenges.html">Weekly Challenges</a>

<a href="marketplace.html">Marketplace</a>

<a href="subscription.html">Subscription</a>

<a href="profile.html">Profile</a>

</div>

<div
class="overlay"
id="overlay"
onclick="closeMenu()"
></div>

<!-- TOPBAR -->

<div class="topbar">

<div
class="menu-btn"

>
☰
</div>

<div class="edit-btn">
Edit Profile
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="container">

<div class="glow"></div>

<div class="profile-card">

<!-- HEADER -->

<div class="profile-header">

<div class="avatar-wrap">

<div class="avatar-glow"></div>

<img
class="avatar"
src="https://i.pravatar.cc/300"
>

</div>

<div class="name">
Velora User
</div>

<div class="username">
@velora
</div>

<div class="vip">
VIP Subscriber
</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-box">

<div class="stat-number">
2450
</div>

<div class="stat-label">
Points
</div>

</div>

<div class="stat-box">

<div class="stat-number">
18
</div>

<div class="stat-label">
Wins
</div>

</div>

<div class="stat-box">

<div class="stat-number">
34
</div>

<div class="stat-label">
Sales
</div>

</div>

<div class="stat-box">

<div class="stat-number">
12
</div>

<div class="stat-label">
Level
</div>

</div>

</div>

<!-- TABS -->

<div class="tabs">

<div class="tab active">
Wardrobe
</div>

<div class="tab">
Marketplace
</div>

<div class="tab">
Challenges
</div>

<div class="tab">
Saved Outfits
</div>

<div class="tab">
Settings
</div>

</div>

<!-- CONTENT -->

<div class="content-box">

<div class="item-grid">

<div class="item">

<img src="https://pngimg.com/d/dress_PNG52.png">

<div class="item-name">
Luxury Dress
</div>

</div>

<div class="item">

<img src="https://pngimg.com/d/jacket_PNG8055.png">

<div class="item-name">
Streetwear Jacket
</div>

</div>

<div class="item">

<img src="https://pngimg.com/d/shoes_PNG7475.png">

<div class="item-name">
Premium Shoes
</div>

</div>

<div class="item">

<img src="https://pngimg.com/d/bag_PNG6383.png">

</div>

</div>

</div>

<script>

/* SIDEBAR */

const sidebar =
document.getElementById("sidebar");

const overlay =
document.getElementById("overlay");

const menuBtn =
document.getElementById("menuBtn");

function toggleMenu(){

sidebar.classList.toggle("active");

overlay.classList.toggle("active");

if(sidebar.classList.contains("active")){

menuBtn.innerHTML = "✕";

}else{

menuBtn.innerHTML = "☰";

}

}

function closeMenu(){

sidebar.classList.remove("active");

overlay.classList.remove("active");

menuBtn.innerHTML = "☰";

}

/* TABS */

const tabs =
document.querySelectorAll(".tab");

tabs.forEach(tab=>{

tab.addEventListener("click",()=>{

document
.querySelector(".tab.active")
.classList.remove("active");

tab.classList.add("active");

});

});

</script>

</body>
  </html>
