<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velora Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

.main{
max-width:700px;
margin:auto;
padding:30px 20px 120px;
}

/* TOP */

.top-title{
text-align:center;
font-size:34px;
font-weight:700;
margin-bottom:40px;
}

/* AVATAR */

.avatar-section{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:40px;
}

.avatar-box{
position:relative;
width:170px;
height:170px;
margin-bottom:18px;
}

.avatar{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

.camera-btn{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
}

.camera-circle{
width:74px;
height:74px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
color:black;
cursor:pointer;
}

.change-photo{
color:#00d5ff;
font-size:28px;
font-weight:600;
cursor:pointer;
}

/* CARDS */

.card{
background:#171717;
border-radius:30px;
padding:10px 24px;
margin-bottom:30px;
}

.row{
height:90px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid #262626;
}

.row:last-child{
border-bottom:none;
}

.label{
font-size:28px;
font-weight:500;
}

.value{
font-size:24px;
color:#d0d0d0;
}

.arrow{
font-size:36px;
color:#9f9f9f;
}

/* SECTION */

.section-title{
font-size:24px;
color:#9e9e9e;
margin:
20px 10px
18px;
}

/* BIO */

.bio-box{
background:#171717;
border-radius:30px;
padding:34px 24px;
margin-bottom:40px;
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
}

.bio-text{
font-size:24px;
line-height:1.7;
color:#9d9d9d;
text-align:right;
}

.bio-label{
font-size:28px;
font-weight:500;
white-space:nowrap;
}

/* MOBILE */

@media(max-width:768px){

.main{
padding:20px 16px 100px;
}

.top-title{
font-size:24px;
margin-bottom:28px;
}

.avatar-box{
width:130px;
height:130px;
}

.camera-circle{
width:58px;
height:58px;
font-size:28px;
}

.change-photo{
font-size:20px;
}

.card{
border-radius:24px;
padding:0 18px;
}

.row{
height:78px;
}

.label{
font-size:20px;
}

.value{
font-size:18px;
}

.arrow{
font-size:28px;
}

.bio-box{
border-radius:24px;
padding:24px 18px;
}

.bio-label{
font-size:22px;
}

.bio-text{
font-size:18px;
}

.section-title{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="main">

<!-- TITLE -->

<div class="top-title">
Edit Profile
</div>

<!-- AVATAR -->

<div class="avatar-section">

<div class="avatar-box">

<img
class="avatar"
id="avatarPreview"
src="https://i.pinimg.com/736x/c8/7f/f2/c87ff2c6d0d92d8d8fd9d5b9f2d0a2a7.jpg"
>

<div class="camera-btn">

<label class="camera-circle" for="uploadAvatar">
📷
</label>

</div>

<input
type="file"
id="uploadAvatar"
hidden
accept="image/*"
>

</div>

<div class="change-photo">
Change Photo
</div>

</div>

<!-- INFO -->

<div class="card">

<div class="row">

<div class="arrow">›</div>

<div class="value">
Any Name
</div>

<div class="label">
Name
</div>

</div>

<div class="row">

<div class="arrow">›</div>

<div class="value">
@velora
</div>

<div class="label">
Username
</div>

</div>

<div class="row">

<div class="arrow">›</div>

<div class="value">
2450
</div>

<div class="label">
Points
</div>

</div>

</div>

<!-- BASIC -->

<div class="section-title">
Basic Information
</div>

<!-- BIO -->

<div class="bio-box">

<div class="arrow">›</div>

<div class="bio-text">
Write a short bio about your personality or your account.
</div>

<div class="bio-label">
Bio
</div>

</div>

<!-- CHALLENGES -->

<div class="card">

<div class="row">

<div class="arrow">›</div>

<div class="value">
18
</div>

<div class="label">
Challenges
</div>

</div>

</div>

<!-- SALES -->

<div class="card">

<div class="row">

<div class="arrow">›</div>

<div class="value">
9200
</div>

<div class="label">
Sales
</div>

</div>

</div>

<!-- LEVEL -->

<div class="card">

<div class="row">

<div class="arrow">›</div>

<div class="value">
12
</div>

<div class="label">
Level
</div>

</div>

</div>

</div>

<script>

/* IMAGE UPLOAD */

const uploadAvatar =
document.getElementById("uploadAvatar");

const avatarPreview =
document.getElementById("avatarPreview");

uploadAvatar.addEventListener(
"change",
function(){

const file = this.files[0];

if(file){

avatarPreview.src =
URL.createObjectURL(file);

}

}
);

</script>

</body>
  </html>
