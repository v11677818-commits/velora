<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

.main{
max-width:720px;
margin:auto;
padding:20px 16px 120px;
}

/* TOP */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:30px;
}

.back-btn,
.save-btn{
width:46px;
height:46px;
border-radius:50%;
background:#171717;
border:1px solid #2b2b2b;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
color:white;
cursor:pointer;
}

.title{
font-size:28px;
font-weight:700;
}

/* AVATAR */

.avatar-section{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:36px;
}

.avatar-box{
position:relative;
width:170px;
height:170px;
margin-bottom:16px;
}

.avatar{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:4px solid #1f1f1f;
}

.camera-btn{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
}

.camera-circle{
width:72px;
height:72px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
color:black;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.change-photo{
font-size:24px;
font-weight:600;
color:#00d7ff;
cursor:pointer;
}

/* CARDS */

.card{
background:#171717;
border-radius:28px;
padding:0 22px;
margin-bottom:26px;
border:1px solid #222;
}

.row{
height:84px;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
border-bottom:1px solid #262626;
}

.row:last-child{
border-bottom:none;
}

.arrow{
font-size:30px;
color:#9c9c9c;
min-width:20px;
}

.label{
font-size:24px;
font-weight:500;
white-space:nowrap;
}

.input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:22px;
text-align:center;
}

.input::placeholder{
color:#8d8d8d;
}

/* SECTION */

.section-title{
font-size:20px;
color:#8e8e8e;
margin:10px 8px 16px;
}

/* BIO */

.bio-box{
background:#171717;
border-radius:28px;
padding:24px 22px;
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:16px;
border:1px solid #222;
margin-bottom:32px;
}

.bio-label{
font-size:24px;
font-weight:500;
white-space:nowrap;
margin-top:6px;
}

.bio-input{
flex:1;
height:120px;
background:transparent;
border:none;
outline:none;
resize:none;
color:white;
font-size:20px;
line-height:1.8;
text-align:right;
}

.bio-input::placeholder{
color:#8d8d8d;
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:22px;
}

.avatar-box{
width:130px;
height:130px;
}

.camera-circle{
width:58px;
height:58px;
font-size:26px;
}

.change-photo{
font-size:20px;
}

.card{
padding:0 16px;
border-radius:24px;
}

.row{
height:76px;
}

.label{
font-size:18px;
}

.input{
font-size:17px;
}

.bio-box{
padding:20px 16px;
border-radius:24px;
}

.bio-label{
font-size:18px;
}

.bio-input{
font-size:17px;
height:100px;
}

.section-title{
font-size:16px;
}

}

</style>
</head>
<body>

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<div class="back-btn">
‹
</div>

<div class="title">
Edit Profile
</div>

<div class="save-btn" onclick="saveProfile()">
✓
</div>

</div>

<!-- AVATAR -->

<div class="avatar-section">

<div class="avatar-box">

<img
class="avatar"
id="avatarPreview"
src="https://i.pinimg.com/736x/52/4c/11/524c11b6aebd4d65a2df8a4d9e7f94f1.jpg"
>

<div class="camera-btn">

<label
class="camera-circle"
for="uploadAvatar"
>
📷
</label>

</div>

<input
hidden
id="uploadAvatar"
type="file"
accept="image/*"
>

</div>

<div class="change-photo">
Change Photo
</div>

</div>

<!-- INFO -->

<div class="card">

<div class="row">

<div class="arrow">‹</div>

<input
class="input"
id="nameInput"
type="text"
placeholder="Any Name"
>

<div class="label">
Name
</div>

</div>

<div class="row">

<div class="arrow">‹</div>

<input
class="input"
id="usernameInput"
type="text"
placeholder="@username"
>

<div class="label">
Username
</div>

</div>

<div class="row">

<div class="arrow">‹</div>

<input
class="input"
id="pointsInput"
type="number"
placeholder="0"
>

<div class="label">
Points
</div>

</div>

</div>

<!-- BASIC -->

<div class="section-title">
Basic Information
</div>

<!-- BIO -->

<div class="bio-box">

<div class="arrow">‹</div>

<textarea
class="bio-input"
id="bioInput"
placeholder="Write a short bio about yourself or your account..."
></textarea>

<div class="bio-label">
Bio
</div>

</div>

<!-- CHALLENGES -->

<div class="card">

<div class="row">

<div class="arrow">‹</div>

<input
class="input"
id="challengeInput"
type="number"
placeholder="0"
>

<div class="label">
Number of Challenges
</div>

</div>

</div>

<!-- SALES -->

<div class="card">

<div class="row">

<div class="arrow">‹</div>

<input
class="input"
id="salesInput"
type="number"
placeholder="0"
>

<div class="label">
Sales
</div>

</div>

</div>

<!-- LEVEL -->

<div class="card">

<div class="row">

<div class="arrow">‹</div>

<input
class="input"
id="levelInput"
type="number"
placeholder="1"
>

<div class="label">
Level
</div>

</div>

</div>

</div>

<script>

/* IMAGE UPLOAD */

const uploadAvatar =
document.getElementById("uploadAvatar");

const avatarPreview =
document.getElementById("avatarPreview");

uploadAvatar.addEventListener(
"change",
function(){

const file = this.files[0];

if(file){

avatarPreview.src =
URL.createObjectURL(file);

}

}
);

/* SAVE PROFILE */

function saveProfile(){

const profileData = {

name:
document.getElementById("nameInput").value,

username:
document.getElementById("usernameInput").value,

points:
document.getElementById("pointsInput").value,

bio:
document.getElementById("bioInput").value,

challenges:
document.getElementById("challengeInput").value,

sales:
document.getElementById("salesInput").value,

level:
document.getElementById("levelInput").value

};

localStorage.setItem(
"veloraProfile",
JSON.stringify(profileData)
);

alert("Profile Saved");

}

/* LOAD PROFILE */

const savedProfile =
JSON.parse(localStorage.getItem("veloraProfile"));

if(savedProfile){

nameInput.value = savedProfile.name || "";

usernameInput.value = savedProfile.username || "";

pointsInput.value = savedProfile.points || "";

bioInput.value = savedProfile.bio || "";

challengeInput.value = savedProfile.challenges || "";

salesInput.value = savedProfile.sales || "";

levelInput.value = savedProfile.level || "";

}

</script>

</body>
</html>
