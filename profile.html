<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velora Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* MAIN */

.main{
max-width:720px;
margin:auto;
padding:20px 16px 120px;
}

/* TOP */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:34px;
}

.circle-btn{
width:46px;
height:46px;
border-radius:50%;
background:#171717;
border:1px solid #2a2a2a;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
cursor:pointer;
}

.title{
font-size:28px;
font-weight:700;
}

/* AVATAR */

.avatar-section{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:38px;
}

.avatar-box{
position:relative;
width:170px;
height:170px;
margin-bottom:18px;
}

.avatar{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:4px solid #1d1d1d;
}

.camera-layer{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
}

.camera-btn{
width:72px;
height:72px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
color:black;
cursor:pointer;
}

.change-photo{
font-size:24px;
font-weight:600;
color:#00d5ff;
}

/* CARD */

.card{
background:#171717;
border:1px solid #242424;
border-radius:28px;
padding:0 22px;
margin-bottom:26px;
}

.row{
height:84px;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
border-bottom:1px solid #262626;
}

.row:last-child{
border-bottom:none;
}

.label{
font-size:24px;
font-weight:500;
white-space:nowrap;
}

.arrow{
font-size:30px;
color:#8d8d8d;
}

.input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:22px;
text-align:center;
}

.input::placeholder{
color:#8c8c8c;
}

.auto{
flex:1;
text-align:center;
font-size:22px;
font-weight:600;
color:#d6d6d6;
}

/* SECTION */

.section-title{
font-size:20px;
color:#8f8f8f;
margin:
10px 8px
18px;
}

/* BIO */

.bio-box{
background:#171717;
border:1px solid #242424;
border-radius:28px;
padding:24px 22px;
margin-bottom:34px;
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:16px;
}

.bio-label{
font-size:24px;
font-weight:500;
margin-top:8px;
}

.bio-input{
flex:1;
height:120px;
background:transparent;
border:none;
outline:none;
resize:none;
color:white;
font-size:20px;
line-height:1.8;
text-align:right;
}

.bio-input::placeholder{
color:#8d8d8d;
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:22px;
}

.avatar-box{
width:130px;
height:130px;
}

.camera-btn{
width:58px;
height:58px;
font-size:26px;
}

.change-photo{
font-size:20px;
}

.card{
padding:0 16px;
border-radius:24px;
}

.row{
height:76px;
}

.label{
font-size:18px;
}

.input{
font-size:17px;
}

.auto{
font-size:18px;
}

.bio-box{
padding:20px 16px;
border-radius:24px;
}

.bio-label{
font-size:18px;
}

.bio-input{
font-size:17px;
height:100px;
}

.section-title{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<div class="circle-btn">
‹
</div>

<div class="title">
Edit Profile
</div>

<div
class="circle-btn"
onclick="saveProfile()"
>
✓
</div>

</div>

<!-- AVATAR -->

<div class="avatar-section">

<div class="avatar-box">

<img
class="avatar"
id="avatarPreview"
src="https://i.pinimg.com/736x/52/4c/11/524c11b6aebd4d65a2df8a4d9e7f94f1.jpg"
>

<div class="camera-layer">

<label
class="camera-btn"
for="avatarUpload"
>
📷
</label>

</div>

<input
hidden
id="avatarUpload"
type="file"
accept="image/*"
>

</div>

<div class="change-photo">
Change Photo
</div>

</div>

<!-- USER INFO -->

<div class="card">

<div class="row">

<div class="arrow">‹</div>

<input
class="input"
id="nameInput"
type="text"
placeholder="Your Name"
>

<div class="label">
Name
</div>

</div>

<div class="row">

<div class="arrow">‹</div>

<input
class="input"
id="usernameInput"
type="text"
placeholder="@username"
>

<div class="label">
Username
</div>

</div>

<div class="row">

<div class="arrow">‹</div>

<div
class="auto"
id="pointsValue"
>
2450
</div>

<div class="label">
Points
</div>

</div>

</div>

<!-- BASIC -->

<div class="section-title">
Basic Information
</div>

<!-- BIO -->

<div class="bio-box">

<div class="arrow">‹</div>

<textarea
class="bio-input"
id="bioInput"
placeholder="Write something about yourself..."
></textarea>

<div class="bio-label">
Bio
</div>

</div>

<!-- CHALLENGES -->

<div class="card">

<div class="row">

<div class="arrow">‹</div>

<div
class="auto"
id="challengeValue"
>
18
</div>

<div class="label">
Challenges
</div>

</div>

</div>

<!-- SALES -->

<div class="card">

<div class="row">

<div class="arrow">‹</div>

<div
class="auto"
id="salesValue"
>
34
</div>

<div class="label">
Sales
</div>

</div>

</div>

<!-- LEVEL -->

<div class="card">

<div class="row">

<div class="arrow">‹</div>

<div
class="auto"
id="levelValue"
>
3
</div>

<div class="label">
Level
</div>

</div>

</div>

</div>

<script>

/* IMAGE */

const avatarUpload =
document.getElementById("avatarUpload");

const avatarPreview =
document.getElementById("avatarPreview");

avatarUpload.addEventListener(
"change",
function(){

const file = this.files[0];

if(file){

avatarPreview.src =
URL.createObjectURL(file);

}

}
);

/* SAVE */

function saveProfile(){

const profile = {

name:
document.getElementById("nameInput").value,

username:
document.getElementById("usernameInput").value,

bio:
document.getElementById("bioInput").value

};

localStorage.setItem(
"veloraProfile",
JSON.stringify(profile)
);

alert("Profile Saved");

}

/* LOAD */

const savedProfile =
JSON.parse(
localStorage.getItem("veloraProfile")
);

if(savedProfile){

document.getElementById(
"nameInput"
).value =
savedProfile.name || "";

document.getElementById(
"usernameInput"
).value =
savedProfile.username || "";

document.getElementById(
"bioInput"
).value =
savedProfile.bio || "";

}

</script>

</body>
  </html>
