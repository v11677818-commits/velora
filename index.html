<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3b6d2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  text-align: center;
}

h1 {
  font-size: 40px;
  margin-bottom: 40px;
}

button {
  width: 100%;
  padding: 15px;
  margin-bottom: 15px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
}

.google {
  background: white;
}

.register {
  background: black;
  color: white;
}

.guest {
  background: transparent;
  border: 2px solid black;
}
</style>

</head>

<body>

<div class="container">

<h1>Thanks</h1>

<button class="google" onclick="loginGoogle()">Continue with Google</button>

<button class="register" onclick="goRegister()">Register</button>

<button class="guest" onclick="loginGuest()">Continue as Guest</button>

</div>

<script>

// guest login
function loginGuest() {
  localStorage.setItem("userType", "guest");
  window.location.href = "bot.html";
}

// register page
function goRegister() {
  window.location.href = "register.html";
}

// fake google (later Firebase)
function loginGoogle() {
  localStorage.setItem("userType", "user");
  localStorage.setItem("username", "User" + Math.floor(Math.random()*1000));
  window.location.href = "bot.html";
}

</script>

</body>
</html>
