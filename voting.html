<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Velora Voting</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
padding:20px;
}

.header{
max-width:700px;
margin:auto;
margin-bottom:20px;
}

.title{
font-size:34px;
font-weight:700;
text-align:center;
margin-bottom:15px;
}

.topDesign{
background:#111;
padding:18px;
border-radius:20px;
text-align:center;
}

.topLabel{
color:#999;
margin-bottom:8px;
}

.topName{
font-size:20px;
font-weight:700;
}

.voteContainer{
max-width:700px;
margin:auto;
}

.voteCard{
background:#111;
padding:15px;
border-radius:24px;
}

.voteImage{
width:100%;
height:450px;
object-fit:cover;
border-radius:18px;
margin-bottom:15px;
background:#1a1a1a;
}

.voteName{
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.voteDescription{
font-size:16px;
color:#aaa;
line-height:1.6;
margin-bottom:20px;
}

.voteActions{
display:flex;
gap:12px;
}

.voteBtn{
flex:1;
height:65px;
border:none;
border-radius:18px;
font-size:28px;
cursor:pointer;
}

.dislikeBtn{
background:#1d1d1d;
color:white;
}

.likeBtn{
background:white;
color:black;
}

.voteCount{
margin-top:18px;
text-align:center;
font-size:18px;
font-weight:700;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
Velora Battle
</div>

<div class="topDesign">

<div class="topLabel">
🏆 Top Design
</div>

<div id="topDesignName" class="topName">
No Designs Yet
</div>

</div>

</div>

<div class="voteContainer">

<div class="voteCard">

<img
id="voteImage"
class="voteImage"
>

<div
id="voteName"
class="voteName"
>
Waiting...
</div>

<div
id="voteDescription"
class="voteDescription"
>
Waiting...
</div>

<div class="voteActions">

<button
class="voteBtn dislikeBtn"
id="dislikeBtn"
>
👎🏻
</button>

<button
class="voteBtn likeBtn"
id="likeBtn"
>
👍🏻
</button>

</div>

<div
id="voteCount"
class="voteCount"
>
❤️ 0 Votes
</div>

</div>

</div>

<script>

/* PART 2 */
let posts =
JSON.parse(
localStorage.getItem(
"veloraBattlePosts"
)
) || [];

let currentIndex = 0;

const voteImage =
document.getElementById(
"voteImage"
);

const voteName =
document.getElementById(
"voteName"
);

const voteDescription =
document.getElementById(
"voteDescription"
);

const voteCount =
document.getElementById(
"voteCount"
);

const topDesignName =
document.getElementById(
"topDesignName"
);

function loadTopDesign(){

if(
posts.length === 0
){

topDesignName.innerText =
"No Designs Yet";

return;

}

posts.sort(
(a,b)=>
b.votes-a.votes
);

topDesignName.innerText =
posts[0].name +
" ❤️ " +
posts[0].votes;

}

function loadPost(){

if(
posts.length === 0
){

voteName.innerText =
"No Designs";

voteDescription.innerText =
"Publish designs from Velora Battle";

return;

}

if(
currentIndex >= posts.length
){

currentIndex = 0;

}

const post =
posts[currentIndex];

voteImage.src =
post.image;

voteName.innerText =
post.name;

voteDescription.innerText =
post.description;

voteCount.innerText =
"❤️ " +
post.votes +
" Votes";

}

document
.getElementById(
"likeBtn"
)
.onclick = ()=>{

if(
posts.length === 0
){
return;
}

posts[currentIndex].votes++;

localStorage.setItem(
"veloraBattlePosts",
JSON.stringify(posts)
);

currentIndex++;

loadTopDesign();

loadPost();

};

document
.getElementById(
"dislikeBtn"
)
.onclick = ()=>{

if(
posts.length === 0
){
return;
}

currentIndex++;

loadPost();

};

loadTopDesign();

loadPost();
  /* =========================
   WINNER SYSTEM
========================= */

function calculateWinners(){

let posts =
JSON.parse(
localStorage.getItem(
"veloraBattlePosts"
)
) || [];

if(
posts.length === 0
){
return;
}

posts.sort(
(a,b)=>
b.votes-a.votes
);

const winners = {

first:
posts[0] || null,

second:
posts[1] || null,

third:
posts[2] || null

};

localStorage.setItem(
"veloraWinners",
JSON.stringify(
winners
)
);

}

calculateWinners();

/* =========================
   WIN RATE
========================= */

function getWinRate(){

if(
battlePosts === 0
){
return 0;
}

return Math.floor(
(battleWins /
battlePosts)
* 100
);

}

/* =========================
   AUTO WIN REWARD
========================= */

function checkWinnerReward(){

let winners =
JSON.parse(
localStorage.getItem(
"veloraWinners"
)
);

if(
!winners ||
!winners.first
){
return;
}

const currentName =
document.getElementById(
"designName"
)?.value;

if(
currentName &&
winners.first.name === currentName
){

battleWins++;

battleXP += 50;

localStorage.setItem(
"battleWins",
battleWins
);

localStorage.setItem(
"battleXP",
battleXP
);

showAchievement(
"🏆 First Place"
);

updateBattleUI();

}

}

checkWinnerReward();
  /* =========================
   ANTI SPAM VOTING
========================= */

let votedPosts =
JSON.parse(
localStorage.getItem(
"veloraVotedPosts"
)
) || [];

function alreadyVoted(postId){

return votedPosts.includes(
postId
);

}

function saveVote(postId){

votedPosts.push(postId);

localStorage.setItem(
"veloraVotedPosts",
JSON.stringify(votedPosts)
);

}

/* =========================
   WIN STREAK
========================= */

let bestStreak =
parseInt(
localStorage.getItem(
"battleBestStreak"
)
) || 0;

if(
battleStreak > bestStreak
){

bestStreak =
battleStreak;

localStorage.setItem(
"battleBestStreak",
bestStreak
);

}

/* =========================
   WIN RATE
========================= */

function getWinRate(){

if(
battlePosts === 0
){

return 0;

}

return Math.floor(

(battleWins /
battlePosts)

*100

);

}

/* =========================
   PROFILE STATS
========================= */

function renderProfileStats(){

const statsBox =
document.createElement(
"div"
);

statsBox.style.marginTop =
"20px";

statsBox.style.padding =
"15px";

statsBox.style.background =
"#111";

statsBox.style.borderRadius =
"20px";

statsBox.innerHTML = `

<h2>📊 Battle Stats</h2>

<p>Posts: ${battlePosts}</p>

<p>Wins: ${battleWins}</p>

<p>XP: ${battleXP}</p>

<p>Win Rate: ${getWinRate()}%</p>

<p>🔥 Best Streak: ${bestStreak}</p>

`;

document.body.appendChild(
statsBox
);

}

renderProfileStats();

/* =========================
   ACHIEVEMENTS GALLERY
========================= */

function renderAchievements(){

let achievements =
JSON.parse(
localStorage.getItem(
"battleAchievements"
)
) || [];

const box =
document.createElement(
"div"
);

box.style.marginTop =
"20px";

box.style.padding =
"15px";

box.style.background =
"#111";

box.style.borderRadius =
"20px";

box.innerHTML =
"<h2>🏅 Achievements</h2>";

achievements.forEach(a=>{

box.innerHTML +=
`<p>${a}</p>`;

});

document.body.appendChild(
box
);

}

renderAchievements();

/* =========================
   TOP 10
========================= */

function renderTop10(){

let board =
JSON.parse(
localStorage.getItem(
"veloraLeaderboard"
)
) || [];

const topBox =
document.createElement(
"div"
);

topBox.style.marginTop =
"20px";

topBox.style.padding =
"15px";

topBox.style.background =
"#111";

topBox.style.borderRadius =
"20px";

topBox.innerHTML =
"<h2>🏆 Top 10</h2>";

board.forEach(
(player,index)=>{

topBox.innerHTML +=

`<p>

#${index+1}
${player.name}
-
${player.xp} XP

</p>`;

}
);

document.body.appendChild(
topBox
);

}

renderTop10();

/* =========================
   VIP BADGE
========================= */

let isVIP =
localStorage.getItem(
"isVIP"
) === "true";

if(isVIP){

const vip =
document.createElement(
"div"
);

vip.innerHTML =
"👑 VIP MEMBER";

vip.style.marginTop =
"20px";

vip.style.padding =
"15px";

vip.style.background =
"gold";

vip.style.color =
"black";

vip.style.borderRadius =
"20px";

vip.style.fontWeight =
"bold";

document.body.appendChild(
vip
);

  }
</script>

</body>
</html>
