<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auth Page</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #d69ac2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 300px;
    text-align: center;
}

.title {
    font-size: 32px;
    margin-bottom: 40px;
    color: black;
}

.input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
    font-size: 14px;
}

.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 25px;
    border: none;
    font-size: 14px;
    cursor: pointer;
}

.google {
    background: white;
}

.login {
    background: #ccc;
}

.guest {
    background: black;
    color: white;
}

.divider {
    height: 1px;
    background: #333;
    margin: 10px 0;
}
</style>

</head>

<body>

<div class="container">

    <div class="title">Thanks</div>

    <!-- Email Login -->
    <input class="input" type="email" id="email" placeholder="Email">
    <input class="input" type="password" id="password" placeholder="Password">

    <!-- Google -->
    <button class="btn google" onclick="googleLogin()">
        Continue with Google
    </button>

    <!-- Login -->
    <button class="btn login" onclick="login()">
        Login
    </button>

    <div class="divider"></div>

    <!-- Guest -->
    <button class="btn guest" onclick="guestLogin()">
        Guest
    </button>

</div>

<script>
function login() {
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    if (email === "" || password === "") {
        alert("Fill all fields");
        return;
    }

    if (!email.includes("@")) {
        alert("Invalid email");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
    }

    alert("Logged in successfully");
}

function googleLogin() {
    alert("Google login coming soon");
}

function guestLogin() {
    alert("Entered as guest");
}
</script>

</body>
</html>
