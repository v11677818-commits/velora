<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #d69ac2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 300px;
    text-align: center;
}

.title {
    font-size: 28px;
    margin-bottom: 30px;
}

.input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 20px;
    border: none;
}

.btn {
    width: 100%;
    padding: 14px;
    border-radius: 25px;
    border: none;
    background: #ccc;
    cursor: pointer;
}

.back {
    margin-top: 10px;
    background: black;
    color: white;
}
</style>

</head>

<body>

<div class="container">
    <div class="title">Login</div>

    <input class="input" type="email" placeholder="Email">
    <input class="input" type="password" placeholder="Password">

    <button class="btn" onclick="login()">Login</button>

    <button class="btn back" onclick="back()">Back</button>
</div>

<script>
function login() {
    alert("Logged in");
}

function back() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
