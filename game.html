<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Velora 3D Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:#050505;
color:white;
}

/* MAIN */

.app{
width:100%;
height:100vh;
display:flex;
}

/* LEFT */

.left{
width:260px;
background:#0b0b0b;
border-right:1px solid #1d1d1d;
padding:25px;
display:flex;
flex-direction:column;
gap:18px;
z-index:10;
}

.category{
height:70px;
border-radius:22px;
background:#121212;
border:1px solid #262626;
display:flex;
align-items:center;
padding-left:20px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.category:hover{
background:#1a1a1a;
}

/* CENTER */

.center{
flex:1;
position:relative;
}

/* TOPBAR */

.topbar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.logo{
font-size:24px;
font-weight:700;
}

.timer{
padding:14px 24px;
border-radius:999px;
background:#111;
border:1px solid #262626;
font-size:16px;
}

/* TOOLS */

.tools{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:14px;
z-index:100;
}

.tool{
width:70px;
height:70px;
border-radius:24px;
background:#111;
border:1px solid #262626;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
cursor:pointer;
transition:.3s;
}

.tool:hover{
background:#1b1b1b;
}

/* RATING */

.finish-btn{
position:absolute;
right:30px;
bottom:30px;
width:220px;
height:65px;
border:none;
border-radius:999px;
background:white;
color:black;
font-size:17px;
font-weight:700;
cursor:pointer;
z-index:100;
}

/* CANVAS */

canvas{
display:block;
}

/* MOBILE */

@media(max-width:900px){

.left{
display:none;
}

.finish-btn{
width:180px;
height:58px;
font-size:15px;
}

.tool{
width:60px;
height:60px;
}

}

</style>
</head>

<body>

<div class="app">

<!-- LEFT -->

<div class="left">

<div class="category">Hair</div>

<div class="category">Tops</div>

<div class="category">Bottoms</div>

<div class="category">Shoes</div>

<div class="category">Luxury</div>

<div class="category">Accessories</div>

<div class="category">Bags</div>

</div>

<!-- CENTER -->

<div class="center">

<div class="topbar">

<div class="logo">
VELORA
</div>

<div class="timer" id="timer">
07:00
</div>

</div>

<div class="tools">

<div class="tool">📷</div>

<div class="tool">🎨</div>

<div class="tool">🗄️</div>

</div>

<button
class="finish-btn"
onclick="finishOutfit()"
>
Finish Outfit
</button>

</div>

</div>

<!-- THREE JS -->

<script type="module">

import * as THREE from
'https://unpkg.com/three@0.160.0/build/three.module.js';

import { OrbitControls } from
'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

/* SCENE */

const scene =
new THREE.Scene();

scene.background =
new THREE.Color(0x050505);

/* CAMERA */

const camera =
new THREE.PerspectiveCamera(
45,
window.innerWidth / window.innerHeight,
0.1,
1000
);

camera.position.set(0,1.4,4);

/* RENDERER */

const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.shadowMap.enabled = true;

document.body.appendChild(
renderer.domElement
);

/* LIGHTS */

const light =
new THREE.DirectionalLight(
0xffffff,
3
);

light.position.set(3,5,3);

scene.add(light);

const ambient =
new THREE.AmbientLight(
0xffffff,
1.5
);

scene.add(ambient);

/* FLOOR */

const floor =
new THREE.Mesh(

new THREE.CircleGeometry(6,64),

new THREE.MeshStandardMaterial({
color:0x111111
})

);

floor.rotation.x = -Math.PI/2;

floor.position.y = -1.5;

scene.add(floor);

/* CHARACTER */

const body =
new THREE.Mesh(

new THREE.CapsuleGeometry(
0.6,
2,
8,
16
),

new THREE.MeshStandardMaterial({

color:0xe2b7a1,
roughness:0.7

})

);

scene.add(body);

/* HEAD */

const head =
new THREE.Mesh(

new THREE.SphereGeometry(
0.48,
32,
32
),

new THREE.MeshStandardMaterial({
color:0xf2c9b2
})

);

head.position.y = 1.8;

scene.add(head);

/* HAIR */

const hair =
new THREE.Mesh(

new THREE.SphereGeometry(
0.53,
32,
32
),

new THREE.MeshStandardMaterial({
color:0x111111
})

);

hair.position.y = 1.9;

hair.scale.y = 0.8;

scene.add(hair);

/* CLOTHES */

const top =
new THREE.Mesh(

new THREE.CylinderGeometry(
0.7,
0.75,
1,
32
),

new THREE.MeshStandardMaterial({
color:0xffffff
})

);

top.position.y = 0.5;

scene.add(top);

const bottom =
new THREE.Mesh(

new THREE.CylinderGeometry(
0.55,
0.55,
1,
32
),

new THREE.MeshStandardMaterial({
color:0x2c2c2c
})

);

bottom.position.y = -0.6;

scene.add(bottom);

/* CONTROLS */

const controls =
new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;

controls.enablePan = false;

controls.minDistance = 3;

controls.maxDistance = 6;

/* TIMER */

let time = 420;

const timer =
document.getElementById("timer");

setInterval(()=>{

let minutes =
Math.floor(time / 60);

let seconds =
time % 60;

seconds =
seconds < 10
? "0"+seconds
: seconds;

timer.innerHTML =
minutes + ":" + seconds;

if(time > 0){

time--;

}

},1000);

/* FINISH */

window.finishOutfit = ()=>{

alert(
"Outfit Submitted Successfully"
);

};

/* ANIMATE */

function animate(){

requestAnimationFrame(
animate
);

controls.update();

renderer.render(
scene,
camera
);

}

animate();

/* RESIZE */

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
  </html>
