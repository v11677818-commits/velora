<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velora Game</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f1f3;
overflow:hidden;
}

/* APP */

.app{
width:100%;
height:100vh;
display:flex;
position:relative;
overflow:hidden;
}

/* LEFT */

.left{
width:50%;
height:100vh;
position:relative;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
180deg,
#f6f1f4,
#ece6ea
);
}

/* TIMER */

.timer{
position:absolute;
top:28px;
left:28px;
background:black;
color:white;
padding:16px 26px;
border-radius:18px;
font-size:42px;
font-weight:700;
letter-spacing:2px;
box-shadow:
0 10px 30px rgba(0,0,0,.15);
}

/* STAGE */

.stage{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* CHARACTER */

.character{
position:relative;
width:260px;
height:720px;
display:flex;
justify-content:center;
align-items:center;
}

/* BODY */

.body{
position:absolute;
width:150px;
height:520px;
background:#efc2ae;
border-radius:90px;
top:90px;
box-shadow:
inset 0 0 30px rgba(0,0,0,.08);
}

/* HEAD */

.head{
position:absolute;
top:0;
width:160px;
height:160px;
background:#efc2ae;
border-radius:40px;
}

/* LEGS */

.leg1,
.leg2{
position:absolute;
width:48px;
height:240px;
background:#efc2ae;
bottom:0;
border-radius:40px;
}

.leg1{
left:70px;
}

.leg2{
right:70px;
}

/* DRESS */

.dress{
position:absolute;
top:210px;
width:170px;
height:260px;
background:black;
border-radius:
40px
40px
26px
26px;
box-shadow:
0 0 30px rgba(0,0,0,.18);
}

/* RIGHT */

.right{
width:50%;
height:100vh;
background:white;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* MODEL */

.model{
width:340px;
height:760px;
position:relative;
opacity:.8;
}

.line{
position:absolute;
border:2px solid #bcbcbc;
border-radius:100px;
}

/* HEAD */

.m-head{
top:0;
left:120px;
width:90px;
height:110px;
}

/* BODY */

.m-body{
top:100px;
left:95px;
width:140px;
height:420px;
}

/* LEGS */

.m-leg1{
bottom:0;
left:120px;
width:40px;
height:260px;
}

.m-leg2{
bottom:0;
right:120px;
width:40px;
height:260px;
}

/* TOOLS */

.tools{
position:absolute;
bottom:24px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:18px;
z-index:10;
}

.tool-btn{
width:78px;
height:78px;
border-radius:24px;
background:white;
border:none;
font-size:34px;
cursor:pointer;
box-shadow:
0 10px 30px rgba(0,0,0,.12);
transition:.25s;
}

.tool-btn:hover{
transform:translateY(-4px);
}

/* WARDROBE */

.wardrobe{
position:fixed;
right:-420px;
top:0;
width:420px;
height:100vh;
background:white;
transition:.35s;
z-index:999;
padding:30px;
overflow-y:auto;
box-shadow:
-10px 0 40px rgba(0,0,0,.08);
}

.wardrobe.active{
right:0;
}

.wardrobe-title{
font-size:34px;
font-weight:700;
margin-bottom:30px;
}

.items{
display:grid;
grid-template-columns:
repeat(2,1fr);
gap:18px;
}

.item{
background:#f4f4f4;
border-radius:28px;
padding:18px;
cursor:pointer;
transition:.25s;
text-align:center;
}

.item:hover{
transform:scale(1.03);
}

.item img{
width:100%;
height:170px;
object-fit:contain;
margin-bottom:14px;
}

.item-name{
font-size:16px;
font-weight:600;
}

/* SUBMIT */

.submit-btn{
position:absolute;
top:28px;
right:28px;
height:70px;
padding:0 34px;
border:none;
border-radius:999px;
background:black;
color:white;
font-size:20px;
font-weight:600;
cursor:pointer;
}

/* ANALYZE */

.analyze{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
backdrop-filter:blur(12px);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
color:white;
}

.analyze.active{
display:flex;
}

.loading{
font-size:42px;
font-weight:700;
margin-bottom:20px;
animation:pulse 1s infinite;
}

.score{
font-size:64px;
font-weight:700;
margin-bottom:18px;
display:none;
}

.stars{
font-size:42px;
display:none;
margin-bottom:18px;
}

.feedback{
font-size:24px;
opacity:.85;
display:none;
text-align:center;
line-height:1.7;
}

@keyframes pulse{

0%{
opacity:.4;
}

50%{
opacity:1;
}

100%{
opacity:.4;
}

}

/* MOBILE */

@media(max-width:900px){

.app{
flex-direction:column;
}

.left,
.right{
width:100%;
height:50vh;
}

.character{
transform:scale(.72);
}

.model{
transform:scale(.72);
}

.timer{
font-size:28px;
padding:12px 18px;
}

.submit-btn{
height:54px;
font-size:15px;
padding:0 22px;
}

.tool-btn{
width:62px;
height:62px;
font-size:28px;
}

.wardrobe{
width:100%;
right:-100%;
}

}

</style>

</head>

<body>

<div class="app">

<!-- LEFT -->

<div class="left">

<div class="timer">
07:00
</div>

<button
class="submit-btn"
onclick="submitOutfit()"
>
Submit Outfit
</button>

<div class="stage">

<div class="character">

<div class="head"></div>

<div class="body"></div>

<div class="leg1"></div>

<div class="leg2"></div>

<div
class="dress"
id="dress"
></div>

</div>

</div>

<!-- TOOLS -->

<div class="tools">

<label
class="tool-btn"
for="uploadImage"
>
📷
</label>

<button class="tool-btn">
🖌️
</button>

<button
class="tool-btn"
onclick="openWardrobe()"
>
🗄️
</button>

</div>

<input
type="file"
id="uploadImage"
hidden
accept="image/*"
>

</div>

<!-- RIGHT -->

<div class="right">

<div class="model">

<div class="line m-head"></div>

<div class="line m-body"></div>

<div class="line m-leg1"></div>

<div class="line m-leg2"></div>

</div>

</div>

</div>

<!-- WARDROBE -->

<div
class="wardrobe"
id="wardrobe"
>

<div class="wardrobe-title">
Wardrobe
</div>

<div class="items">

<div
class="item"
onclick="changeDress('black')"
>

<img src="https://pngimg.com/d/dress_PNG52.png">

<div class="item-name">
Black Dress
</div>

</div>

<div
class="item"
onclick="changeDress('#f5b5cf')"
>

<img src="https://pngimg.com/d/dress_PNG56.png">

<div class="item-name">
Pink Dress
</div>

</div>

<div
class="item"
onclick="changeDress('#d9d9d9')"
>

<img src="https://pngimg.com/d/dress_PNG57.png">

<div class="item-name">
Silver Dress
</div>

</div>

<div
class="item"
onclick="changeDress('#784cff')"
>

<img src="https://pngimg.com/d/dress_PNG58.png">

<div class="item-name">
Purple Dress
</div>

</div>

</div>

</div>

<!-- ANALYZE -->

<div
class="analyze"
id="analyze"
>

<div
class="loading"
id="loading"
>
Analyzing Outfit...
</div>

<div
class="score"
id="score"
>
Style Score: 98
</div>

<div
class="stars"
id="stars"
>
★★★★★
</div>

<div
class="feedback"
id="feedback"
>
Luxury Styling<br>
Perfect Color Balance<br>
Elegant Fashion Choice
</div>

</div>

<script>

/* WARDROBE */

const wardrobe =
document.getElementById("wardrobe");

function openWardrobe(){

wardrobe.classList.toggle("active");

}

/* DRESS */

const dress =
document.getElementById("dress");

function changeDress(color){

dress.style.background = color;

}

/* ANALYZE */

const analyze =
document.getElementById("analyze");

const loading =
document.getElementById("loading");

const score =
document.getElementById("score");

const stars =
document.getElementById("stars");

const feedback =
document.getElementById("feedback");

function submitOutfit(){

analyze.classList.add("active");

loading.style.display = "block";

score.style.display = "none";

stars.style.display = "none";

feedback.style.display = "none";

setTimeout(()=>{

loading.style.display = "none";

score.style.display = "block";

stars.style.display = "block";

feedback.style.display = "block";

},10000);

}

</script>

</body>
  </html>
