<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Velora Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:#f6f0f0;
}

/* APP */

.app{
display:flex;
width:100%;
height:100vh;
}

/* LEFT */

.left{
width:50%;
height:100%;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
180deg,
#f7f3f3 0%,
#efe6e6 100%
);
}

/* WALL */

.wall{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(
90deg,
#f4eeee 0%,
#f7f3f3 20%,
#ffffff 50%,
#f7f3f3 80%,
#f4eeee 100%
);
}

/* FLOOR */

.floor{
position:absolute;
bottom:0;
width:100%;
height:180px;
background:
linear-gradient(
180deg,
#3d2a25 0%,
#241714 100%
);
}

/* COLUMNS */

.column-left{
position:absolute;
left:0;
top:0;
width:120px;
height:100%;
background:#f4eeee;
box-shadow:
10px 0 20px rgba(0,0,0,.04);
}

.column-right{
position:absolute;
right:0;
top:0;
width:120px;
height:100%;
background:#f4eeee;
box-shadow:
-10px 0 20px rgba(0,0,0,.04);
}

/* TIMER */

.timer{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
width:170px;
height:78px;
background:black;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:42px;
font-weight:700;
letter-spacing:2px;
z-index:20;
}

/* MENU BUTTON */

.menu-button{
position:absolute;
top:25px;
left:25px;
width:70px;
height:70px;
border-radius:50%;
background:#161616;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
color:white;
z-index:999;
cursor:pointer;
box-shadow:
0 10px 30px rgba(0,0,0,.25);
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100vh;
background:#111111;
z-index:1000;
padding-top:120px;
transition:.4s;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar.active{
left:0;
}

.sidebar-logo{
position:absolute;
top:35px;
left:35px;
font-size:30px;
font-weight:700;
color:white;
letter-spacing:3px;
}

.sidebar a{
color:white;
text-decoration:none;
padding:18px 35px;
font-size:20px;
transition:.3s;
}

.sidebar a:hover{
background:#1f1f1f;
}

/* CHARACTER */

.character{
position:relative;
width:250px;
height:720px;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
}

/* HEAD */

.head{
position:absolute;
top:110px;
width:120px;
height:120px;
background:#ddb39d;
border-radius:30px;
}

/* NECK */

.neck{
position:absolute;
top:215px;
width:30px;
height:35px;
background:#ddb39d;
border-radius:12px;
}

/* BODY */

.body{
position:absolute;
top:235px;
width:95px;
height:220px;
background:#080808;
border-radius:40px;
}

/* ARMS */

.arm-left{
position:absolute;
left:42px;
top:250px;
width:28px;
height:250px;
background:#ddb39d;
border-radius:30px;
transform:rotate(6deg);
}

.arm-right{
position:absolute;
right:42px;
top:255px;
width:28px;
height:235px;
background:#ddb39d;
border-radius:30px;
transform:rotate(-7deg);
}

/* LEGS */

.leg-left{
position:absolute;
left:72px;
top:430px;
width:38px;
height:280px;
background:#ddb39d;
border-radius:40px;
transform:rotate(4deg);
}

.leg-right{
position:absolute;
right:72px;
top:430px;
width:38px;
height:280px;
background:#ddb39d;
border-radius:40px;
transform:rotate(-5deg);
}

/* SHOES */

.shoe-left{
position:absolute;
left:64px;
bottom:-8px;
width:46px;
height:18px;
background:#f7e7de;
border-radius:30px;
transform:rotate(5deg);
}

.shoe-right{
position:absolute;
right:64px;
bottom:-8px;
width:46px;
height:18px;
background:#f7e7de;
border-radius:30px;
transform:rotate(-5deg);
}

/* RIGHT */

.right{
width:50%;
height:100%;
background:white;
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

/* CANVAS */

.canvas-box{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* MANNEQUIN */

.mannequin{
width:340px;
height:720px;
object-fit:contain;
}

/* TOOLS */

.tools{
position:absolute;
bottom:35px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
}

/* TOOL */

.tool{
width:80px;
height:80px;
background:#555555;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
color:white;
cursor:pointer;
transition:.3s;
}

.tool:hover{
background:#2d2d2d;
}

/* MOBILE */

@media(max-width:900px){

.app{
flex-direction:column;
}

.left{
width:100%;
height:50%;
}

.right{
width:100%;
height:50%;
}

.character{
transform:scale(.72);
}

.mannequin{
width:240px;
height:520px;
}

.tool{
width:65px;
height:65px;
font-size:28px;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="sidebar-logo">
VELORA
</div>

<a href="bot.html">
Bot
</a>

<a href="game.html">
Game
</a>

<a href="marketplace.html">
Marketplace
</a>

<a href="challenges.html">
Challenges
</a>

<a href="outfits.html">
Outfits
</a>

<a href="group.html">
Group
</a>

<a href="profile.html">
Profile
</a>

<a href="subscription.html">
Subscription
</a>

</div>

<!-- APP -->

<div class="app">

<!-- LEFT -->

<div class="left">

<div class="wall"></div>

<div class="floor"></div>

<div class="column-left"></div>

<div class="column-right"></div>

<!-- MENU -->

<div
class="menu-button"
onclick="toggleMenu()"
>
☰
</div>

<!-- TIMER -->

<div
class="timer"
id="timer"
>
07:00
</div>

<!-- CHARACTER -->

<div class="character">

<div class="head"></div>

<div class="neck"></div>

<div class="body"></div>

<div class="arm-left"></div>

<div class="arm-right"></div>

<div class="leg-left"></div>

<div class="leg-right"></div>

<div class="shoe-left"></div>

<div class="shoe-right"></div>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<div class="canvas-box">

<img
src="assets/girl.png"
class="mannequin"
/>

<div class="tools">

<div class="tool">
📷
</div>

<div class="tool">
AI
</div>

<div class="tool">
✏️
</div>

</div>

</div>

</div>

</div>

<script>

/* MENU */

function toggleMenu(){

document
.getElementById("sidebar")
.classList
.toggle("active");

}

/* TIMER */

let time = 420;

const timer =
document.getElementById("timer");

setInterval(()=>{

let minutes =
Math.floor(time / 60);

let seconds =
time % 60;

seconds =
seconds < 10
? "0"+seconds
: seconds;

timer.innerHTML =
minutes + ":" + seconds;

if(time > 0){

time--;

}

},1000);

</script>

</body>
</html>
