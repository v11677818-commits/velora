<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora Game</title>

<script src="sidebar.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:#f5f2f3;
}

.menuBtn{
position:fixed;
top:20px;
left:20px;
width:50px;
height:50px;
border:none;
border-radius:12px;
background:black;
color:white;
font-size:24px;
cursor:pointer;
z-index:9999;
}

.timer{
position:absolute;
top:20px;
left:90px;
background:black;
color:white;
padding:12px 24px;
border-radius:14px;
font-size:28px;
font-weight:bold;
z-index:10;
}

.game{
display:flex;
width:100%;
height:100%;
}

.leftSide{
position:relative;
width:50%;
height:100%;
overflow:hidden;
}

.rightSide{
position:relative;
width:50%;
height:100%;
background:white;
border-left:4px solid #ececec;
}

.room{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

.girl{
position:absolute;
bottom:5%;
left:50%;
transform:translateX(-50%);
height:75%;
object-fit:contain;
pointer-events:none;
}

.mannequin{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-55%);
height:78%;
object-fit:contain;
pointer-events:none;
}

.tools{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
}

.tool{
width:60px;
height:60px;
border:none;
border-radius:14px;
background:#f1f1f1;
font-size:26px;
cursor:pointer;
}

.tool:hover{
background:#e6e6e6;
}

.aiBtn{
width:auto;
padding:0 18px;
font-size:22px;
font-weight:bold;
}

</style>
</head>
<body>

<button class="menuBtn" onclick="toggleMenu()">☰</button>

<div class="timer" id="timer">
07:00
</div>

<div class="game">

<div class="leftSide">

<img src="assets/room.png" class="room">

<img src="assets/girl.png" class="girl">

</div>

<div class="rightSide">

<img src="assets/mannequin.png" class="mannequin">

<div class="tools">

<button class="tool">🗄️</button>

<button class="tool">📷</button>

<button class="tool aiBtn">AI</button>

<button class="tool">✏️</button>

<button class="tool">↪</button>

</div>

</div>

</div>

</body>
</html>
