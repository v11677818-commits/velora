<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Velora Game</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
overflow:hidden;
color:white;
}

/* APP */

.app{
width:100%;
height:100vh;
display:flex;
position:relative;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-300px;
width:300px;
height:100vh;
background:#0c0c0c;
border-right:1px solid #1d1d1d;
padding:100px 25px;
transition:.35s;
z-index:9999;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin-bottom:34px;
font-size:19px;
}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:999;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* TOPBAR */

.topbar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.menu-btn{
width:52px;
height:52px;
border-radius:50%;
background:#121212;
border:1px solid #262626;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
cursor:pointer;
}

.timer{
padding:15px 26px;
border-radius:999px;
background:#121212;
border:1px solid #262626;
font-size:16px;
font-weight:600;
}

/* MAIN */

.main{
width:100%;
height:100vh;
display:flex;
}

/* LEFT */

.left-panel{
width:260px;
background:#090909;
border-right:1px solid #1c1c1c;
padding:110px 20px 20px;
overflow-y:auto;
}

.category{
height:64px;
border-radius:22px;
background:#111;
border:1px solid #262626;
display:flex;
align-items:center;
padding-left:22px;
margin-bottom:16px;
cursor:pointer;
transition:.3s;
}

.category:hover{
background:#181818;
}

/* CENTER */

.center{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.glow{
position:absolute;
width:700px;
height:700px;
background:
radial-gradient(
circle,
rgba(255,255,255,.08),
transparent
);
filter:blur(100px);
}

/* CHARACTER */

.character{
position:relative;
width:320px;
height:620px;
border-radius:40px;
background:
linear-gradient(
180deg,
#1d1d1d,
#0f0f0f
);
border:1px solid #2a2a2a;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
box-shadow:
0 0 60px rgba(255,255,255,.06);
}

/* MODEL */

.model{
position:absolute;
width:220px;
height:500px;
background:
linear-gradient(
180deg,
#ffdcc7,
#d7a893
);
border-radius:120px 120px 70px 70px;
}

/* LAYERS */

.layer{
position:absolute;
inset:0;
pointer-events:none;
}

#topLayer{
background:
linear-gradient(
180deg,
transparent 0%,
transparent 35%,
#ffffff 35%,
#ffffff 55%,
transparent 55%
);
opacity:.9;
}

#bottomLayer{
background:
linear-gradient(
180deg,
transparent 55%,
#2b2b2b 55%,
#2b2b2b 80%,
transparent 80%
);
}

#shoesLayer{
background:
linear-gradient(
180deg,
transparent 82%,
white 82%,
white 88%,
transparent 88%
);
}

/* RIGHT */

.right-panel{
width:330px;
background:#090909;
border-left:1px solid #1c1c1c;
padding:110px 20px 20px;
display:flex;
flex-direction:column;
}

/* DESIGN */

.design-box{
flex:1;
border-radius:34px;
background:#111;
border:1px solid #262626;
overflow:hidden;
margin-bottom:20px;
}

canvas{
width:100%;
height:100%;
background:#151515;
}

/* TOOLS */

.tools{
display:flex;
justify-content:space-between;
gap:12px;
}

.tool{
flex:1;
height:70px;
border-radius:26px;
background:#111;
border:1px solid #262626;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
transition:.3s;
}

.tool:hover{
background:#181818;
}

/* RATE BUTTON */

.rate-btn{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:260px;
height:64px;
border:none;
border-radius:999px;
background:white;
color:black;
font-size:16px;
font-weight:700;
cursor:pointer;
z-index:50;
}

/* RATING */

.rating-screen{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
backdrop-filter:blur(18px);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
flex-direction:column;
}

.rating-screen.active{
display:flex;
}

.scan{
font-size:22px;
margin-bottom:30px;
animation:pulse 1.4s infinite;
}

.stars{
font-size:70px;
margin-bottom:20px;
}

.rating-title{
font-size:42px;
font-weight:700;
margin-bottom:12px;
}

.rating-text{
font-size:18px;
opacity:.8;
margin-bottom:20px;
}

.points{
font-size:30px;
font-weight:700;
margin-bottom:12px;
}

.level{
font-size:20px;
opacity:.85;
}

/* ANIMATIONS */

@keyframes pulse{

0%{
opacity:.3;
}

50%{
opacity:1;
}

100%{
opacity:.3;
}

}

/* MOBILE */

@media(max-width:900px){

.left-panel{
display:none;
}

.right-panel{
width:100%;
height:250px;
position:absolute;
bottom:0;
right:0;
padding:20px;
background:rgba(10,10,10,.95);
backdrop-filter:blur(18px);
}

.design-box{
height:130px;
}

.character{
width:220px;
height:430px;
}

.model{
width:160px;
height:360px;
}

}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<a href="group.html">Group</a>

<a href="chat.html">Bot</a>

<a href="outfits.html">Outfits</a>

<a href="challenges.html">Challenges</a>

<a href="store.html">Marketplace</a>

<a href="subscription.html">Subscription</a>

<a href="profile.html">Profile</a>

</div>

<div
class="overlay"
id="overlay"
onclick="closeMenu()"
></div>

<!-- TOPBAR -->

<div class="topbar">

<div
class="menu-btn"
onclick="openMenu()"
>
☰
</div>

<div class="timer" id="timer">
07:00
</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- LEFT -->

<div class="left-panel">

<div class="category">Hair</div>

<div class="category">Tops</div>

<div class="category">Bottoms</div>

<div class="category">Shoes</div>

<div class="category">Accessories</div>

<div class="category">Makeup</div>

<div class="category">Bags</div>

<div class="category">Luxury</div>

</div>

<!-- CENTER -->

<div class="center">

<div class="glow"></div>

<div class="character">

<div class="model"></div>

<div class="layer" id="topLayer"></div>

<div class="layer" id="bottomLayer"></div>

<div class="layer" id="shoesLayer"></div>

</div>

<button
class="rate-btn"
onclick="startRating()"
>
Finish Outfit
</button>

</div>

<!-- RIGHT -->

<div class="right-panel">

<div class="design-box">

<canvas id="canvas"></canvas>

</div>

<div class="tools">

<div class="tool">📷</div>

<div class="tool">AI</div>

<div class="tool">🎨</div>

<div class="tool">🗄️</div>

</div>

</div>

</div>

</div>

<!-- RATING -->

<div class="rating-screen" id="ratingScreen">

<div class="scan">
Analyzing Outfit...
</div>

<div class="stars" id="stars">
★★★★★
</div>

<div class="rating-title" id="ratingTitle">
Luxury Fashion
</div>

<div class="rating-text" id="ratingText">
Perfect Color Balance
</div>

<div class="points" id="points">
+50 Points
</div>

<div class="level" id="level">
Level 1
</div>

</div>

<script>

/* =========================
SIDEBAR
========================= */

const sidebar =
document.getElementById("sidebar");

const overlay =
document.getElementById("overlay");

function openMenu(){

sidebar.classList.add("active");

overlay.classList.add("active");

}

function closeMenu(){

sidebar.classList.remove("active");

overlay.classList.remove("active");

}

/* =========================
USER SYSTEM
========================= */

let role = "registered";

let userData = {

points:0,
level:1

};

function updateLevel(){

if(userData.points >= 10000){

userData.level = 10;

}

else if(userData.points >= 7000){

userData.level = 8;

}

else if(userData.points >= 5000){

userData.level = 6;

}

else if(userData.points >= 3000){

userData.level = 4;

}

else{

userData.level = 1;

}

}

function addPoints(amount){

userData.points += amount;

updateLevel();

localStorage.setItem(
"veloraGame",
JSON.stringify(userData)
);

}

const savedData =
localStorage.getItem(
"veloraGame"
);

if(savedData){

userData =
JSON.parse(savedData);

}

/* =========================
TIMER
========================= */

let time = 420;

const timer =
document.getElementById("timer");

const timerInterval =
setInterval(()=>{

let minutes =
Math.floor(time / 60);

let seconds =
time % 60;

seconds =
seconds < 10
? "0" + seconds
: seconds;

timer.innerHTML =
`${minutes}:${seconds}`;

if(time > 0){

time--;

}

if(time === 0){

clearInterval(timerInterval);

startRating();

}

},1000);

/* =========================
RATING
========================= */

const ratingScreen =
document.getElementById("ratingScreen");

function startRating(){

ratingScreen.classList.add("active");

let stars =
Math.floor(Math.random() * 5) + 1;

document.getElementById(
"stars"
).innerHTML =
"★".repeat(stars);

let reward = 0;

if(role === "registered"){

if(stars === 1) reward = 10;
if(stars === 2) reward = 20;
if(stars === 3) reward = 30;
if(stars === 4) reward = 40;
if(stars === 5) reward = 50;

}

if(role === "subscriber"){

if(stars === 1) reward = 20;
if(stars === 2) reward = 40;
if(stars === 3) reward = 60;
if(stars === 4) reward = 75;
if(stars === 5) reward = 80;

}

addPoints(reward);

document.getElementById(
"points"
).innerHTML =
"+" + reward + " Points";

document.getElementById(
"level"
).innerHTML =
"Level " + userData.level;

if(stars === 5){

document.getElementById(
"ratingTitle"
).innerHTML =
"Perfect Fashion";

document.getElementById(
"ratingText"
).innerHTML =
"Luxury aesthetic detected";

}

}

/* =========================
CANVAS
========================= */

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

canvas.width = 600;
canvas.height = 600;

let drawing = false;

canvas.addEventListener(
"mousedown",
()=>{

drawing = true;

}
);

canvas.addEventListener(
"mouseup",
()=>{

drawing = false;

ctx.beginPath();

}
);

canvas.addEventListener(
"mousemove",
draw
);

function draw(e){

if(!drawing) return;

ctx.lineWidth = 4;

ctx.lineCap = "round";

ctx.strokeStyle = "white";

ctx.lineTo(
e.offsetX,
e.offsetY
);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(
e.offsetX,
e.offsetY
);

}

</script>

</body>
</html>
