<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Velora Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:#f4efef;
}

/* APP */

.app{
width:100%;
height:100vh;
display:flex;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-320px;
width:300px;
height:100vh;
background:#111111;
z-index:9999;
transition:.35s;
padding-top:120px;
display:flex;
flex-direction:column;
}

.sidebar.active{
left:0;
}

.sidebar-logo{
position:absolute;
top:35px;
left:35px;
color:white;
font-size:34px;
font-weight:700;
letter-spacing:3px;
}

.sidebar a{
padding:20px 35px;
color:white;
text-decoration:none;
font-size:20px;
transition:.3s;
}

.sidebar a:hover{
background:#1f1f1f;
}

/* MENU BUTTON */

.menu-button{
position:absolute;
top:25px;
left:25px;
width:72px;
height:72px;
border-radius:50%;
background:#111111;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
color:white;
cursor:pointer;
z-index:999;
}

/* LEFT */

.left{
width:50%;
height:100%;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:flex-end;
}

/* ROOM */

.room{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* GIRL */

.girl{
position:absolute;
height:88%;
bottom:0;
z-index:5;
object-fit:contain;
pointer-events:none;
filter:
drop-shadow(
0 10px 30px rgba(0,0,0,.2)
);
}

/* TIMER */

.timer{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
width:180px;
height:82px;
background:#111111;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:700;
color:white;
z-index:20;
letter-spacing:2px;
}

/* SCORE */

.score{
position:absolute;
top:125px;
left:50%;
transform:translateX(-50%);
background:white;
padding:12px 28px;
border-radius:20px;
font-size:22px;
font-weight:700;
z-index:20;
box-shadow:
0 8px 20px rgba(0,0,0,.1);
}

/* RIGHT */

.right{
width:50%;
height:100%;
background:white;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* MANNEQUIN */

.mannequin{
position:absolute;
height:84%;
opacity:.95;
pointer-events:none;
}

/* DRAW CANVAS */

#drawCanvas{
position:absolute;
width:100%;
height:100%;
z-index:10;
touch-action:none;
}

/* UPLOAD IMAGE */

.uploaded-clothes{
position:absolute;
max-width:220px;
z-index:30;
cursor:grab;
}

/* TOOLS */

.tools{
position:absolute;
bottom:35px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:18px;
z-index:100;
}

/* TOOL */

.tool{
width:82px;
height:82px;
background:#5c5c5c;
border-radius:22px;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
color:white;
cursor:pointer;
transition:.3s;
box-shadow:
0 10px 25px rgba(0,0,0,.12);
}

.tool:hover{
background:#2f2f2f;
transform:translateY(-4px);
}

/* FILE INPUT */

#uploadInput{
display:none;
}

/* MOBILE */

@media(max-width:900px){

.app{
flex-direction:column;
}

.left{
width:100%;
height:50%;
}

.right{
width:100%;
height:50%;
}

.girl{
height:78%;
}

.mannequin{
height:76%;
}

.tool{
width:65px;
height:65px;
font-size:26px;
}

.timer{
width:150px;
height:65px;
font-size:32px;
}

.score{
top:100px;
font-size:18px;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div
class="sidebar"
id="sidebar"
>

<div class="sidebar-logo">
VELORA
</div>

<a href="bot.html">
Bot
</a>

<a href="game.html">
Game
</a>

<a href="marketplace.html">
Marketplace
</a>

<a href="challenges.html">
Challenges
</a>

<a href="outfits.html">
Outfits
</a>

<a href="group.html">
Group
</a>

<a href="profile.html">
Profile
</a>

<a href="subscription.html">
Subscription
</a>

</div>

<!-- APP -->

<div class="app">

<!-- LEFT -->

<div class="left">

<img
src="assets/room.png"
class="room"
/>

<img
src="assets/girl.png"
class="girl"
/>

<div
class="menu-button"
onclick="toggleMenu()"
>
☰
</div>

<div
class="timer"
id="timer"
>
07:00
</div>

<div class="score">
Points: <span id="points">0</span>
</div>

</div>

<!-- RIGHT -->

<div class="right" id="rightSide">

<img
src="assets/mannequin.png"
class="mannequin"
/>

<canvas id="drawCanvas"></canvas>

<div class="tools">

<div
class="tool"
onclick="document.getElementById('uploadInput').click()"
>
📷
</div>

<div
class="tool"
onclick="clearCanvas()"
>
AI
</div>

<div
class="tool"
onclick="enableDraw()"
>
✏️
</div>

</div>

<input
type="file"
id="uploadInput"
accept="image/*"
/>

</div>

</div>

<script>

/* SIDEBAR */

function toggleMenu(){

document
.getElementById("sidebar")
.classList
.toggle("active");

}

/* TIMER */

let time = 420;

const timer =
document.getElementById("timer");

setInterval(()=>{

let minutes =
Math.floor(time / 60);

let seconds =
time % 60;

seconds =
seconds < 10
? "0"+seconds
: seconds;

timer.innerHTML =
minutes + ":" + seconds;

if(time > 0){

time--;

}

},1000);

/* POINTS */

let points = 0;

function addPoints(){

points += 10;

document
.getElementById("points")
.innerHTML = points;

}

/* CANVAS */

const canvas =
document.getElementById("drawCanvas");

const ctx =
canvas.getContext("2d");

function resizeCanvas(){

canvas.width =
canvas.offsetWidth;

canvas.height =
canvas.offsetHeight;

}

resizeCanvas();

window.addEventListener(
'resize',
resizeCanvas
);

let drawing = false;

/* DRAW */

function startDraw(e){

drawing = true;

draw(e);

}

function endDraw(){

drawing = false;

ctx.beginPath();

}

function draw(e){

if(!drawing) return;

const rect =
canvas.getBoundingClientRect();

const x =
e.clientX - rect.left;

const y =
e.clientY - rect.top;

ctx.lineWidth = 5;

ctx.lineCap = "round";

ctx.strokeStyle = "#111111";

ctx.lineTo(x,y);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(x,y);

}

/* ENABLE DRAW */

function enableDraw(){

canvas.addEventListener(
'mousedown',
startDraw
);

canvas.addEventListener(
'mouseup',
endDraw
);

canvas.addEventListener(
'mousemove',
draw
);

canvas.addEventListener(
'touchstart',
(e)=>{

const touch =
e.touches[0];

startDraw({

clientX:touch.clientX,
clientY:touch.clientY

});

});

canvas.addEventListener(
'touchend',
endDraw
);

canvas.addEventListener(
'touchmove',
(e)=>{

const touch =
e.touches[0];

draw({

clientX:touch.clientX,
clientY:touch.clientY

});

});

}

/* CLEAR */

function clearCanvas(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

}

/* UPLOAD CLOTHES */

const uploadInput =
document.getElementById("uploadInput");

const rightSide =
document.getElementById("rightSide");

uploadInput.addEventListener(
'change',
function(e){

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(event){

const img =
document.createElement("img");

img.src =
event.target.result;

img.className =
"uploaded-clothes";

img.style.left = "50%";

img.style.top = "45%";

rightSide.appendChild(img);

dragElement(img);

addPoints();

};

reader.readAsDataURL(file);

}
);

/* DRAG SYSTEM */

function dragElement(elmnt){

let pos1 = 0,
pos2 = 0,
pos3 = 0,
pos4 = 0;

elmnt.onmousedown =
dragMouseDown;

function dragMouseDown(e){

e = e || window.event;

e.preventDefault();

pos3 = e.clientX;

pos4 = e.clientY;

document.onmouseup =
closeDragElement;

document.onmousemove =
elementDrag;

}

function elementDrag(e){

e = e || window.event;

e.preventDefault();

pos1 = pos3 - e.clientX;

pos2 = pos4 - e.clientY;

pos3 = e.clientX;

pos4 = e.clientY;

elmnt.style.top =
(elmnt.offsetTop - pos2)
+ "px";

elmnt.style.left =
(elmnt.offsetLeft - pos1)
+ "px";

}

function closeDragElement(){

document.onmouseup = null;

document.onmousemove = null;

}

}

</script>

</body>
</html>
