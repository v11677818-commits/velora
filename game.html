<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora Game</title>

<script src="sidebar.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

.game{
position:fixed;
inset:0;
display:flex;
width:100vw;
height:100vh;
}

/* LEFT */

.left{
position:relative;
width:50%;
height:100%;
overflow:hidden;
background:#000;
}

.room{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

.girl{
position:absolute;
left:50%;
bottom:0;
transform:translateX(-50%);
height:92%;
max-width:90%;
object-fit:contain;
z-index:2;
}

/* RIGHT */

.right{
position:relative;
width:50%;
height:100%;
background:#fff;
overflow:hidden;
border-left:3px solid #e5e5e5;
}

.mannequin{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
height:84%;
max-width:90%;
object-fit:contain;
z-index:1;
}

/* DRAW */

#drawCanvas{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:60%;
height:84%;
z-index:5;
touch-action:none;
}

#colorPicker{
display:none;
}

/* TOP */

.menuBtn{
position:fixed;
top:16px;
left:16px;
width:60px;
height:60px;
border:none;
border-radius:16px;
background:#000;
color:#fff;
font-size:28px;
cursor:pointer;
z-index:9999;
}

.timer{
position:fixed;
top:16px;
left:90px;
background:#000;
color:#fff;
padding:16px 24px;
border-radius:16px;
font-size:22px;
font-weight:700;
z-index:9999;
}

/* TOOLS */

.tools{
position:absolute;
bottom:24px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:14px;
z-index:100;
}

.tool{
width:72px;
height:72px;
border:none;
border-radius:18px;
background:#f2f2f2;
font-size:30px;
cursor:pointer;
}

.tool:active{
transform:scale(.95);
}

@media(max-width:900px){

.left{
width:50%;
}

.right{
width:50%;
}

.girl{
height:75%;
}

.mannequin{
height:70%;
}

#drawCanvas{
height:70%;
}

.tool{
width:60px;
height:60px;
font-size:24px;
}

.timer{
font-size:18px;
padding:12px 18px;
}

}

</style>
</head>

<body>

<button class="menuBtn" onclick="toggleMenu()">☰</button>

<div class="timer" id="timer">
07:00
</div>

<div class="game">

<div class="left">

<img src="assets/room.png" class="room">

<img src="assets/girl.png" class="girl">

</div>

<div class="right">

<img src="assets/mannequin.png" class="mannequin">

<canvas id="drawCanvas"></canvas>

<input type="color" id="colorPicker">

<div class="tools">

<button class="tool">🗄️</button>

<button class="tool">📷</button>

<button class="tool">✏️</button>

<button class="tool">↪️</button>

</div>

</div>

</div>

<script>

/* TIMER */

let time = 420;

function updateTimer(){

let min = Math.floor(time/60);
let sec = time%60;

document.getElementById("timer").innerText =
String(min).padStart(2,"0")
+ ":" +
String(sec).padStart(2,"0");

if(time>0){
time--;
}

}

setInterval(updateTimer,1000);

/* DRAW */

const canvas =
document.getElementById("drawCanvas");

const ctx =
canvas.getContext("2d");

let drawing = false;
let color = "#000000";

function resizeCanvas(){

canvas.width =
canvas.offsetWidth;

canvas.height =
canvas.offsetHeight;

}

setTimeout(
resizeCanvas,
100
);

window.addEventListener(
"resize",
resizeCanvas
);

function getPos(e){

const rect =
canvas.getBoundingClientRect();

if(e.touches){

return{
x:e.touches[0].clientX-rect.left,
y:e.touches[0].clientY-rect.top
};

}

return{
x:e.clientX-rect.left,
y:e.clientY-rect.top
};

}

function start(e){

drawing = true;

const pos =
getPos(e);

ctx.beginPath();

ctx.moveTo(
pos.x,
pos.y
);

}

function move(e){

if(!drawing) return;

e.preventDefault();

const pos =
getPos(e);

ctx.strokeStyle =
color;

ctx.lineWidth = 8;

ctx.lineCap = "round";

ctx.lineTo(
pos.x,
pos.y
);

ctx.stroke();

}

function end(){

drawing = false;

ctx.beginPath();

}

canvas.addEventListener(
"mousedown",
start
);

canvas.addEventListener(
"mousemove",
move
);

canvas.addEventListener(
"mouseup",
end
);

canvas.addEventListener(
"mouseleave",
end
);

canvas.addEventListener(
"touchstart",
start
);

canvas.addEventListener(
"touchmove",
move
);

canvas.addEventListener(
"touchend",
end
);

document
.getElementById("colorPicker")
.addEventListener(
"input",
e=>{

color =
e.target.value;

}
);

/* ✏️ */

document
.querySelectorAll(".tool")[2]
.onclick = ()=>{

document
.getElementById("colorPicker")
.click();

};

/* ↪️ */

document
.querySelectorAll(".tool")[3]
.onclick = ()=>{

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

};

</script>
<!-- WARDROBE -->

<div id="wardrobe">

<div class="wardrobeHeader">
Wardrobe
</div>

<div class="emptyWardrobe">

No Purchased Items Yet

</div>

</div>

<style>

#wardrobe{

position:fixed;
right:-420px;
top:0;
width:420px;
height:100%;

background:#111;

transition:.3s;

z-index:99999;

padding:20px;

}

#wardrobe.active{

right:0;

}

.wardrobeHeader{

color:white;

font-size:28px;

font-weight:700;

margin-bottom:20px;

}

.emptyWardrobe{

height:calc(100% - 60px);

display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:#888;

font-size:22px;

}

</style>

<script>

/* 🗄️ */

document
.querySelectorAll(".tool")[0]
.onclick = ()=>{

document
.getElementById("wardrobe")
.classList
.toggle("active");

};

/* 📷 */

document
.querySelectorAll(".tool")[1]
.onclick = ()=>{

alert(
"Upload Clothes Coming Next"
);

};

  </script>
<!-- FASHION SHOW -->

<div id="fashionShow">

<img src="assets/girl.png" id="showGirl">

<div id="ratingBox">

<div id="ratingTitle">
FINAL SCORE
</div>

<div id="ratingScore">
0
</div>

<button id="backBtn">
RETURN
</button>

</div>

</div>

<style>

#fashionShow{

position:fixed;
inset:0;

background:rgba(0,0,0,.95);

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999999;

}

#showGirl{

height:75%;

object-fit:contain;

animation:modelSpin 2s infinite alternate;

}

@keyframes modelSpin{

0%{
transform:translateX(-20px);
}

100%{
transform:translateX(20px);
}

}

#ratingBox{

display:none;

text-align:center;

color:white;

}

#ratingTitle{

font-size:42px;

font-weight:700;

margin-bottom:20px;

}

#ratingScore{

font-size:90px;

font-weight:900;

margin-bottom:30px;

}

#backBtn{

width:220px;

height:65px;

border:none;

border-radius:16px;

font-size:20px;

cursor:pointer;

}

</style>

<script>

/* TIMER END */

function finishChallenge(){

document
.getElementById("fashionShow")
.style.display="flex";

setTimeout(()=>{

document
.getElementById("showGirl")
.style.display="none";

document
.getElementById("ratingBox")
.style.display="block";

const score =
Math.floor(
70 + Math.random()*31
);

document
.getElementById("ratingScore")
.innerText =
score + "/100";

},10000);

}

const oldTimer =
setInterval(()=>{

if(time<=0){

clearInterval(oldTimer);

finishChallenge();

}

},1000);

/* RETURN */

document
.getElementById("backBtn")
.onclick=()=>{

window.location.href=
"index.html";

};

</script>
  <script>

/* PLAYER DATA */

let veloraPoints =
parseInt(
localStorage.getItem("veloraPoints")
) || 0;

let veloraStars =
parseInt(
localStorage.getItem("veloraStars")
) || 0;

/* FINAL RESULT */

function saveResult(score){

veloraPoints += score;

let stars = 1;

if(score >= 90){

stars = 5;

}else if(score >= 85){

stars = 4;

}else if(score >= 75){

stars = 3;

}else if(score >= 65){

stars = 2;

}

veloraStars += stars;

localStorage.setItem(
"veloraPoints",
veloraPoints
);

localStorage.setItem(
"veloraStars",
veloraStars
);

localStorage.setItem(
"lastScore",
score
);

localStorage.setItem(
"lastStars",
stars
);

}

/* FASHION SHOW RESULT */

function finishChallenge(){

document
.getElementById("fashionShow")
.style.display="flex";

setTimeout(()=>{

document
.getElementById("showGirl")
.style.display="none";

document
.getElementById("ratingBox")
.style.display="block";

const score =
Math.floor(
70 + Math.random()*31
);

document
.getElementById("ratingScore")
.innerText =
score + "/100";

saveResult(score);

},10000);

}

/* LEADERBOARD DATA */

window.veloraData = {

getPoints(){
return localStorage.getItem(
"veloraPoints"
) || 0;
},

getStars(){
return localStorage.getItem(
"veloraStars"
) || 0;
},

getLastScore(){
return localStorage.getItem(
"lastScore"
) || 0;
}

};

  </script>
</body>
  </html>
