<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velora Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
overflow:hidden;
height:100vh;
color:#fff;
}

/* APP */

.app{
display:flex;
width:100%;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:95px;
background:#0b0b0b;
border-right:1px solid #1d1d1d;
display:flex;
flex-direction:column;
align-items:center;
padding:22px 0;
gap:18px;
z-index:50;
}

.logo{
font-size:24px;
font-weight:600;
margin-bottom:18px;
}

.tool{
width:62px;
height:62px;
border-radius:22px;
background:#141414;
border:1px solid #252525;
display:flex;
justify-content:center;
align-items:center;
font-size:13px;
text-align:center;
cursor:pointer;
transition:.2s;
padding:6px;
}

.tool:hover{
background:#1d1d1d;
}

/* MAIN */

.main{
flex:1;
position:relative;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* TOPBAR */

.topbar{
position:absolute;
top:18px;
left:18px;
right:18px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.timer{
padding:14px 26px;
border-radius:999px;
background:#121212;
border:1px solid #252525;
font-size:17px;
font-weight:600;
}

.finish-btn{
height:54px;
padding:0 28px;
border:none;
border-radius:999px;
background:#fff;
color:#000;
font-size:15px;
font-weight:600;
cursor:pointer;
}

/* STAGE */

.stage{
position:relative;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* GLOW */

.glow{
position:absolute;
width:700px;
height:700px;
background:
radial-gradient(
circle,
rgba(255,255,255,.08),
transparent
);
filter:blur(80px);
}

/* MODEL */

.model-wrapper{
position:relative;
width:340px;
height:700px;
display:flex;
justify-content:center;
align-items:center;
animation:float 4s ease-in-out infinite;
}

/* MODEL BODY */

.model{
position:relative;
width:250px;
height:620px;
}

/* HEAD */

.head{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:120px;
height:120px;
background:
linear-gradient(
180deg,
#ffe6d7,
#f2c3ab
);
border-radius:50%;
z-index:3;
}

/* HAIR */

.hair{
position:absolute;
top:-5px;
left:50%;
transform:translateX(-50%);
width:145px;
height:155px;
background:#0f0f0f;
border-radius:80px;
z-index:2;
}

/* BODY */

.body{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:180px;
height:500px;
background:
linear-gradient(
180deg,
#ffe7d9,
#f1c0a7
);
border-radius:100px;
z-index:1;
}

/* CLOTHES AREA */

.clothes-layer{
position:absolute;
top:160px;
left:50%;
transform:translateX(-50%);
width:220px;
height:320px;
z-index:5;
overflow:visible;
}

/* DRAG IMAGE */

.draggable{
position:absolute;
top:0;
left:0;
width:220px;
cursor:grab;
user-select:none;
touch-action:none;
}

/* BOTTOM TOOLS */

.bottom-tools{
position:absolute;
bottom:22px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:14px;
z-index:100;
flex-wrap:wrap;
justify-content:center;
}

.bottom-tools button{
height:54px;
padding:0 24px;
border:none;
border-radius:999px;
background:#141414;
border:1px solid #262626;
color:#fff;
cursor:pointer;
font-size:15px;
}

/* POSES */

.poses{
position:absolute;
right:22px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:14px;
z-index:100;
}

.pose{
width:110px;
height:56px;
border-radius:18px;
background:#141414;
border:1px solid #252525;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
cursor:pointer;
}

/* RESULT */

.result{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
backdrop-filter:blur(18px);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.result.active{
display:flex;
}

.result-title{
font-size:38px;
font-weight:600;
margin-bottom:20px;
}

.loading{
width:280px;
height:8px;
border-radius:999px;
background:#1c1c1c;
overflow:hidden;
margin-bottom:24px;
}

.loading span{
display:block;
height:100%;
width:0%;
background:#fff;
animation:load 10s linear forwards;
}

.analyze{
font-size:17px;
color:#b8b8b8;
margin-bottom:32px;
}

.final-rating{
display:none;
flex-direction:column;
align-items:center;
animation:fade .5s ease;
}

.stars{
font-size:50px;
letter-spacing:8px;
margin:20px 0;
}

.points{
font-size:28px;
font-weight:600;
}

.continue-btn{
margin-top:30px;
height:56px;
padding:0 34px;
border:none;
border-radius:999px;
background:#fff;
color:#000;
font-size:15px;
cursor:pointer;
}

/* PARTICLES */

.particles{
position:absolute;
inset:0;
pointer-events:none;
overflow:hidden;
}

.particles span{
position:absolute;
width:4px;
height:4px;
background:#fff;
border-radius:50%;
opacity:.2;
animation:particles 12s linear infinite;
}

/* ANIMATIONS */

@keyframes load{

0%{
width:0%;
}

100%{
width:100%;
}

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes particles{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:.2;
}

100%{
transform:translateY(-100px);
opacity:0;
}

}

/* MOBILE */

@media(max-width:900px){

.sidebar{
width:78px;
}

.tool{
width:54px;
height:54px;
font-size:11px;
}

.model-wrapper{
transform:scale(.82);
}

.poses{
right:10px;
}

.pose{
width:90px;
font-size:12px;
}

.result-title{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
V
</div>

<label class="tool">
Upload
<input type="file" id="uploadInput" hidden accept="image/*">
</label>

<div class="tool" id="zoomIn">
Zoom +
</div>

<div class="tool" id="zoomOut">
Zoom -
</div>

<div class="tool" id="rotateBtn">
Rotate
</div>

<div class="tool">
Brush
</div>

<div class="tool">
Color
</div>

<div class="tool">
Save
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="particles">

<span style="left:10%;animation-delay:0s"></span>
<span style="left:20%;animation-delay:2s"></span>
<span style="left:40%;animation-delay:4s"></span>
<span style="left:60%;animation-delay:1s"></span>
<span style="left:80%;animation-delay:5s"></span>

</div>

<div class="topbar">

<div class="timer" id="timer">
07:00
</div>

<button class="finish-btn" id="finishBtn">
Finish Design
</button>

</div>

<!-- STAGE -->

<div class="stage">

<div class="glow"></div>

<div class="model-wrapper">

<div class="model">

<div class="hair"></div>

<div class="head"></div>

<div class="body"></div>

<div class="clothes-layer" id="clothesLayer"></div>

</div>

</div>

</div>

<!-- POSES -->

<div class="poses">

<div class="pose">
Elegant
</div>

<div class="pose">
Luxury
</div>

<div class="pose">
Fashion
</div>

<div class="pose">
Soft
</div>

<div class="pose">
Model
</div>

</div>

<!-- BOTTOM -->

<div class="bottom-tools">

<button>
Weekly Challenge
</button>

<button>
Save Design
</button>

<button>
My Designs
</button>

</div>

</div>

</div>

<!-- RESULT -->

<div class="result" id="result">

<div id="analyzeScreen">

<div class="result-title">
Analyzing Design
</div>

<div class="loading">
<span></span>
</div>

<div class="analyze">
Reviewing outfit balance and style quality
</div>

</div>

<div class="final-rating" id="finalRating">

<div class="result-title">
Final Rating
</div>

<div class="stars">
★★★★★
</div>

<div class="points">
+50 Points
</div>

<button class="continue-btn">
Continue
</button>

</div>

</div>

<script>

/* TIMER */

let time = 420;

const timer =
document.getElementById("timer");

setInterval(()=>{

let minutes =
Math.floor(time / 60);

let seconds =
time % 60;

if(seconds < 10){
seconds = "0" + seconds;
}

timer.innerText =
`${minutes}:${seconds}`;

if(time > 0){
time--;
}

},1000);

/* IMAGE */

const uploadInput =
document.getElementById("uploadInput");

const clothesLayer =
document.getElementById("clothesLayer");

let currentImage = null;

let scale = 1;

let rotation = 0;

uploadInput.addEventListener("change",(e)=>{

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

clothesLayer.innerHTML = `

<img
src="${event.target.result}"
class="draggable"
id="dragItem"
>

`;

currentImage =
document.getElementById("dragItem");

dragElement(currentImage);

};

reader.readAsDataURL(file);

});

/* DRAG */

function dragElement(elmnt){

let pos1=0,pos2=0,pos3=0,pos4=0;

elmnt.onmousedown = dragMouseDown;

function dragMouseDown(e){

e.preventDefault();

pos3 = e.clientX;
pos4 = e.clientY;

document.onmouseup =
closeDragElement;

document.onmousemove =
elementDrag;

}

function elementDrag(e){

e.preventDefault();

pos1 = pos3 - e.clientX;
pos2 = pos4 - e.clientY;

pos3 = e.clientX;
pos4 = e.clientY;

elmnt.style.top =
(elmnt.offsetTop - pos2) + "px";

elmnt.style.left =
(elmnt.offsetLeft - pos1) + "px";

}

function closeDragElement(){

document.onmouseup = null;
document.onmousemove = null;

}

}

/* ZOOM */

document
.getElementById("zoomIn")
.onclick = ()=>{

if(!currentImage) return;

scale += 0.1;

updateTransform();

};

document
.getElementById("zoomOut")
.onclick = ()=>{

if(!currentImage) return;

scale -= 0.1;

updateTransform();

};

/* ROTATE */

document
.getElementById("rotateBtn")
.onclick = ()=>{

if(!currentImage) return;

rotation += 15;

updateTransform();

};

function updateTransform(){

currentImage.style.transform = `
scale(${scale})
rotate(${rotation}deg)
`;

}

/* FINISH */

const finishBtn =
document.getElementById("finishBtn");

const result =
document.getElementById("result");

const finalRating =
document.getElementById("finalRating");

finishBtn.onclick = ()=>{

result.classList.add("active");

setTimeout(()=>{

document
.getElementById("analyzeScreen")
.style.display = "none";

finalRating.style.display = "flex";

},10000);

};

</script>

</body>
  </html>
