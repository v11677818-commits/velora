<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velora Game</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:#fff;
height:100vh;
}

/* APP */

.app{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
position:relative;
overflow:hidden;
}

/* TOPBAR */

.topbar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.menu-btn{
width:52px;
height:52px;
border-radius:50%;
border:1px solid #2a2a2a;
background:#151515;
color:#fff;
font-size:24px;
cursor:pointer;
}

.timer{
background:#151515;
border:1px solid #2a2a2a;
padding:15px 28px;
border-radius:40px;
font-size:18px;
font-weight:600;
}

/* MAIN */

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding-top:80px;
}

/* MODEL AREA */

.model-area{
position:relative;
width:100%;
max-width:1200px;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* MODEL */

.model-card{
width:360px;
height:620px;
background:linear-gradient(
180deg,
#1a1a1a,
#0d0d0d
);
border:1px solid #252525;
border-radius:40px;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
box-shadow:
0 0 40px rgba(255,255,255,.03);
}

/* FAKE 3D MODEL */

.model{
width:260px;
height:520px;
position:relative;
display:flex;
justify-content:center;
align-items:center;
animation:float 4s ease-in-out infinite;
}

/* BODY */

.body{
width:170px;
height:420px;
background:
linear-gradient(
180deg,
#ffe5d7,
#f2c5af
);
border-radius:90px;
position:absolute;
bottom:0;
}

/* HEAD */

.head{
width:120px;
height:120px;
background:
linear-gradient(
180deg,
#ffe5d7,
#f1c1a9
);
border-radius:50%;
position:absolute;
top:20px;
z-index:2;
}

/* HAIR */

.hair{
width:150px;
height:140px;
background:#111;
border-radius:80px;
position:absolute;
top:0;
z-index:1;
}

/* CLOTHES */

.clothes{
position:absolute;
width:180px;
height:260px;
top:160px;
border-radius:30px;
overflow:hidden;
z-index:3;
display:flex;
justify-content:center;
align-items:center;
}

.clothes img{
width:100%;
height:100%;
object-fit:cover;
}

/* GLOW */

.glow{
position:absolute;
width:420px;
height:420px;
background:
radial-gradient(
circle,
rgba(255,255,255,.08),
transparent
);
filter:blur(40px);
z-index:-1;
}

/* SIDE TOOLS */

.tools{
position:absolute;
right:40px;
display:flex;
flex-direction:column;
gap:18px;
}

.tool-btn{
width:68px;
height:68px;
border-radius:24px;
background:#151515;
border:1px solid #292929;
color:#fff;
font-size:15px;
cursor:pointer;
}

/* BOTTOM */

.bottom{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:16px;
z-index:100;
}

.bottom button{
height:56px;
padding:0 26px;
border:none;
border-radius:999px;
background:#151515;
border:1px solid #2a2a2a;
color:#fff;
font-size:15px;
cursor:pointer;
}

/* RESULT SCREEN */

.result-screen{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
backdrop-filter:blur(16px);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.result-screen.active{
display:flex;
}

/* ANALYZE */

.analyze-text{
font-size:34px;
font-weight:600;
margin-bottom:20px;
}

.loading{
width:260px;
height:8px;
background:#1d1d1d;
border-radius:999px;
overflow:hidden;
margin-bottom:26px;
}

.loading span{
display:block;
width:0%;
height:100%;
background:#fff;
animation:load 10s linear forwards;
}

.pose-title{
font-size:18px;
margin-bottom:18px;
color:#cfcfcf;
}

.poses{
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
max-width:700px;
}

.pose-btn{
padding:14px 22px;
background:#151515;
border:1px solid #2a2a2a;
border-radius:999px;
color:#fff;
cursor:pointer;
}

/* FINAL */

.final-rating{
display:none;
flex-direction:column;
align-items:center;
animation:fade .6s ease;
}

.stars{
font-size:46px;
margin:20px 0;
letter-spacing:10px;
}

.points{
font-size:26px;
font-weight:600;
margin-top:10px;
}

.continue-btn{
margin-top:28px;
height:56px;
padding:0 34px;
border:none;
border-radius:999px;
background:#fff;
color:#000;
font-size:16px;
cursor:pointer;
}

/* ANIMATION */

@keyframes load{

0%{
width:0%;
}

100%{
width:100%;
}

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:900px){

.model-card{
width:280px;
height:520px;
}

.model{
transform:scale(.85);
}

.tools{
right:18px;
}

.tool-btn{
width:58px;
height:58px;
font-size:13px;
}

.analyze-text{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="app">

<!-- TOP -->

<div class="topbar">

<button class="menu-btn">
☰
</button>

<div class="timer" id="timer">
07:00
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="model-area">

<div class="glow"></div>

<!-- MODEL -->

<div class="model-card">

<div class="model" id="model">

<div class="hair"></div>

<div class="head"></div>

<div class="body"></div>

<div class="clothes" id="clothes"></div>

</div>

</div>

<!-- TOOLS -->

<div class="tools">

<input
type="file"
id="upload"
accept="image/*"
hidden
>

<button
class="tool-btn"
id="uploadBtn"
>
Upload
</button>

<button class="tool-btn">
Brush
</button>

<button class="tool-btn">
Color
</button>

<button class="tool-btn" id="saveBtn">
Save
</button>

</div>

</div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<button id="finishBtn">
Finish Design
</button>

<button>
Challenges
</button>

</div>

</div>

<!-- RESULT -->

<div class="result-screen" id="resultScreen">

<div id="analyzeSection">

<div class="analyze-text">
Analyzing Design
</div>

<div class="loading">
<span></span>
</div>

<div class="pose-title">
Choose Pose
</div>

<div class="poses">

<button class="pose-btn">
Elegant
</button>

<button class="pose-btn">
Luxury
</button>

<button class="pose-btn">
Cute
</button>

<button class="pose-btn">
Fashion
</button>

<button class="pose-btn">
Model
</button>

<button class="pose-btn">
Soft
</button>

</div>

</div>

<div class="final-rating" id="finalRating">

<div class="analyze-text">
Final Rating
</div>

<div class="stars">
★★★★★
</div>

<div class="points">
+50 Points
</div>

<button class="continue-btn">
Continue
</button>

</div>

</div>

<script>

/* TIMER */

let time = 420;

const timer =
document.getElementById("timer");

setInterval(()=>{

let minutes =
Math.floor(time / 60);

let seconds =
time % 60;

if(seconds < 10){
seconds = "0" + seconds;
}

timer.innerText =
`${minutes}:${seconds}`;

if(time > 0){
time--;
}

},1000);

/* UPLOAD */

const uploadBtn =
document.getElementById("uploadBtn");

const upload =
document.getElementById("upload");

const clothes =
document.getElementById("clothes");

uploadBtn.onclick = ()=>{

upload.click();

};

upload.addEventListener("change",(e)=>{

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload = function(event){

clothes.innerHTML = `
<img src="${event.target.result}">
`;

};

reader.readAsDataURL(file);

});

/* FINISH */

const finishBtn =
document.getElementById("finishBtn");

const resultScreen =
document.getElementById("resultScreen");

const analyzeSection =
document.getElementById("analyzeSection");

const finalRating =
document.getElementById("finalRating");

finishBtn.onclick = ()=>{

resultScreen.classList.add("active");

setTimeout(()=>{

analyzeSection.style.display =
"none";

finalRating.style.display =
"flex";

},10000);

};

</script>

</body>
</html>
