<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Velora</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:black;
}

/* FULL UI */

.full-ui{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

/* MENU */

.menu-button{
position:fixed;
top:25px;
left:25px;
width:70px;
height:70px;
border-radius:50%;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
color:white;
cursor:pointer;
z-index:1000;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100vh;
background:#111;
z-index:2000;
transition:.35s;
padding-top:120px;
display:flex;
flex-direction:column;
}

.sidebar.active{
left:0;
}

.sidebar a{
color:white;
text-decoration:none;
padding:20px 35px;
font-size:20px;
}

.sidebar a:hover{
background:#1f1f1f;
}

/* DRAW */

#drawCanvas{
position:fixed;
right:0;
top:0;
width:50%;
height:100%;
z-index:500;
touch-action:none;
}

/* TOOLS */

.tools{
position:fixed;
bottom:30px;
right:12%;
display:flex;
gap:18px;
z-index:1000;
}

.tool{
width:80px;
height:80px;
border-radius:20px;
background:#555;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
color:white;
cursor:pointer;
}

/* FILE */

#uploadInput{
display:none;
}

.uploaded{
position:fixed;
right:15%;
top:35%;
width:180px;
z-index:800;
cursor:grab;
}

</style>
</head>

<body>

<img
src="assets/full-ui.png"
class="full-ui"
/>

<!-- MENU -->

<div
class="menu-button"
onclick="toggleMenu()"
>
☰
</div>

<!-- SIDEBAR -->

<div
class="sidebar"
id="sidebar"
>

<a href="#">
Bot
</a>

<a href="#">
Game
</a>

<a href="#">
Marketplace
</a>

<a href="#">
Challenges
</a>

<a href="#">
Outfits
</a>

<a href="#">
Group
</a>

<a href="#">
Profile
</a>

</div>

<!-- DRAW -->

<canvas id="drawCanvas"></canvas>

<!-- TOOLS -->

<div class="tools">

<div
class="tool"
onclick="document.getElementById('uploadInput').click()"
>
📷
</div>

<div
class="tool"
onclick="clearCanvas()"
>
AI
</div>

<div
class="tool"
onclick="enableDraw()"
>
✏️
</div>

</div>

<input
type="file"
id="uploadInput"
accept="image/*"
/>

<script>

/* SIDEBAR */

function toggleMenu(){

document
.getElementById("sidebar")
.classList
.toggle("active");

}

document.addEventListener(
'click',
function(e){

const sidebar =
document.getElementById(
'sidebar'
);

const menu =
document.querySelector(
'.menu-button'
);

if(
!sidebar.contains(e.target)
&&
!menu.contains(e.target)
){

sidebar.classList.remove(
'active'
);

}

}
);

/* CANVAS */

const canvas =
document.getElementById(
'drawCanvas'
);

const ctx =
canvas.getContext('2d');

function resizeCanvas(){

canvas.width =
canvas.offsetWidth;

canvas.height =
canvas.offsetHeight;

}

resizeCanvas();

window.addEventListener(
'resize',
resizeCanvas
);

let drawing = false;

/* DRAW */

function startDraw(e){

drawing = true;

draw(e);

}

function endDraw(){

drawing = false;

ctx.beginPath();

}

function draw(e){

if(!drawing) return;

const rect =
canvas.getBoundingClientRect();

const x =
e.clientX - rect.left;

const y =
e.clientY - rect.top;

ctx.lineWidth = 5;

ctx.lineCap = 'round';

ctx.strokeStyle = '#111';

ctx.lineTo(x,y);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(x,y);

}

/* ENABLE */

function enableDraw(){

canvas.addEventListener(
'mousedown',
startDraw
);

canvas.addEventListener(
'mouseup',
endDraw
);

canvas.addEventListener(
'mousemove',
draw
);

}

/* CLEAR */

function clearCanvas(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

}

/* UPLOAD */

const uploadInput =
document.getElementById(
'uploadInput'
);

uploadInput.addEventListener(
'change',
function(e){

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(event){

const img =
document.createElement('img');

img.src =
event.target.result;

img.className =
'uploaded';

document.body.appendChild(
img
);

};

reader.readAsDataURL(file);

}
);

</script>

</body>
</html>
