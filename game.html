<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
background:black;
}

.left{
width:50%;
height:100%;
background:#222;
position:relative;
}

.right{
width:50%;
height:100%;
background:white;
position:relative;
}

img{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
max-width:90%;
max-height:90%;
}

</style>
</head>
<body>

<div class="left">
<img src="assets/girl.png">
</div>

<div class="right">
<img src="assets/mannequin.png">
</div>

</body>
</html>
