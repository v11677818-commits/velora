<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Velora Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:#f3eded;
}

/* APP */

.app{
width:100%;
height:100vh;
display:flex;
}

/* LEFT SIDE */

.left{
width:50%;
height:100%;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:flex-end;
}

/* ROOM */

.room{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* GIRL */

.girl{
position:absolute;
height:88%;
bottom:0;
z-index:5;
object-fit:contain;
filter:
drop-shadow(
0 15px 35px rgba(0,0,0,.18)
);
}

/* TIMER */

.timer{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
width:170px;
height:78px;
background:#111111;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:700;
color:white;
z-index:20;
letter-spacing:2px;
}

/* MENU */

.menu-button{
position:absolute;
top:25px;
left:25px;
width:72px;
height:72px;
border-radius:50%;
background:#111111;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
color:white;
cursor:pointer;
z-index:30;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100vh;
background:#111111;
padding-top:120px;
display:flex;
flex-direction:column;
gap:8px;
transition:.4s;
z-index:999;
}

.sidebar.active{
left:0;
}

.sidebar-logo{
position:absolute;
top:35px;
left:35px;
font-size:32px;
font-weight:700;
letter-spacing:3px;
color:white;
}

.sidebar a{
padding:18px 35px;
font-size:20px;
color:white;
text-decoration:none;
transition:.3s;
}

.sidebar a:hover{
background:#1d1d1d;
}

/* RIGHT SIDE */

.right{
width:50%;
height:100%;
background:white;
position:relative;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* MANNEQUIN */

.mannequin{
height:82%;
object-fit:contain;
opacity:.95;
}

/* TOOLS */

.tools{
position:absolute;
bottom:35px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
}

/* TOOL */

.tool{
width:82px;
height:82px;
border-radius:22px;
background:#5a5a5a;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
color:white;
cursor:pointer;
transition:.3s;
box-shadow:
0 10px 25px rgba(0,0,0,.12);
}

.tool:hover{
background:#2e2e2e;
transform:translateY(-3px);
}

/* MOBILE */

@media(max-width:900px){

.app{
flex-direction:column;
}

.left{
width:100%;
height:50%;
}

.right{
width:100%;
height:50%;
}

.girl{
height:80%;
}

.mannequin{
height:75%;
}

.tool{
width:65px;
height:65px;
font-size:28px;
}

.timer{
width:145px;
height:65px;
font-size:32px;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div
class="sidebar"
id="sidebar"
>

<div class="sidebar-logo">
VELORA
</div>

<a href="bot.html">
Bot
</a>

<a href="game.html">
Game
</a>

<a href="marketplace.html">
Marketplace
</a>

<a href="challenges.html">
Challenges
</a>

<a href="outfits.html">
Outfits
</a>

<a href="group.html">
Group
</a>

<a href="profile.html">
Profile
</a>

<a href="subscription.html">
Subscription
</a>

</div>

<!-- APP -->

<div class="app">

<!-- LEFT -->

<div class="left">

<img
src="assets/room.png"
class="room"
/>

<img
src="assets/girl.png"
class="girl"
/>

<div
class="menu-button"
onclick="toggleMenu()"
>
☰
</div>

<div
class="timer"
id="timer"
>
07:00
</div>

</div>

<!-- RIGHT -->

<div class="right">

<img
src="assets/mannequin.png"
class="mannequin"
/>

<div class="tools">

<div class="tool">
📷
</div>

<div class="tool">
AI
</div>

<div class="tool">
✏️
</div>

</div>

</div>

</div>

<script>

/* MENU */

function toggleMenu(){

document
.getElementById("sidebar")
.classList
.toggle("active");

}

/* TIMER */

let time = 420;

const timer =
document.getElementById("timer");

setInterval(()=>{

let minutes =
Math.floor(time / 60);

let seconds =
time % 60;

seconds =
seconds < 10
? "0"+seconds
: seconds;

timer.innerHTML =
minutes + ":" + seconds;

if(time > 0){

time--;

}

},1000);

</script>

</body>
</html>
