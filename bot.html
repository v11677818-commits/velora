<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velora - Bot</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui;
  background: #0d0d0d;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* top */
.topbar {
  height: 60px;
  display: flex;
  align-items: center;
  padding: 0 15px;
}

.menu {
  font-size: 22px;
  cursor: pointer;
}

/* chat */
.chat {
  flex: 1;
  padding: 10px 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* message */
.msg {
  max-width: 75%;
  margin-bottom: 12px;
  padding: 10px 14px;
  border-radius: 18px;
  line-height: 1.4;
  font-size: 14px;
}

.user {
  align-self: flex-end;
  background: #2a2a2a;
}

.bot {
  align-self: flex-start;
  background: #1a1a1a;
}

/* image inside message */
.msg img {
  width: 100%;
  border-radius: 12px;
  margin-top: 6px;
}

/* input */
.inputBox {
  display: flex;
  align-items: center;
  padding: 10px;
  background: #0d0d0d;
  border-top: 1px solid #222;
}

input[type="text"] {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: #1a1a1a;
  color: white;
}

.file {
  margin-left: 8px;
  cursor: pointer;
}

button {
  margin-left: 8px;
  padding: 10px 14px;
  border-radius: 20px;
  border: none;
  background: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="topbar">
  <div class="menu">☰</div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBox">
  <input id="message" type="text" placeholder="Type a message...">
  <input type="file" id="imageInput" class="file">
  <button onclick="send()">Send</button>
</div>

<script>

// نوع المستخدم
let userType = localStorage.getItem("userType") || "guest";

// عدد الصور
let imageCount = 0;

function send() {
  let text = document.getElementById("message").value;
  let fileInput = document.getElementById("imageInput");
  let file = fileInput.files[0];

  // شرط الضيف (21 صورة فقط)
  if (file && userType === "guest" && imageCount >= 21) {
    alert("Guest limit reached (21 images)");
    return;
  }

  if (text === "" && !file) return;

  let imageURL = null;

  if (file) {
    imageURL = URL.createObjectURL(file);
    imageCount++;
  }

  addMessage(text, imageURL, "user");

  setTimeout(() => {
    addMessage("Bot reply 🔥", null, "bot");
  }, 400);

  document.getElementById("message").value = "";
  fileInput.value = "";
}

function addMessage(text, image, type) {
  let chat = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.classList.add("msg", type);

  msg.innerHTML = text;

  if (image) {
    let img = document.createElement("img");
    img.src = image;
    msg.appendChild(img);
  }

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
