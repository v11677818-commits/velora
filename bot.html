<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velora</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* top right */
.top {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 15px;
}

/* subscribe */
.sub {
  background: #1c1c1e;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
}

/* menu */
.menu {
  width: 36px;
  height: 36px;
  background: #1c1c1e;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

/* center text */
.center {
  text-align: center;
  font-size: 18px;
  color: #d1d1d1;
}

/* bottom */
.bottom {
  padding: 10px;
}

/* input container */
.inputBox {
  display: flex;
  align-items: center;
  background: #1c1c1e;
  border-radius: 25px;
  padding: 6px 10px;
}

/* icons */
.icon {
  font-size: 18px;
  margin: 0 6px;
  opacity: 0.7;
}

/* input */
input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  outline: none;
  font-size: 14px;
}
</style>

</head>

<body>

<!-- top -->
<div class="top">
  <div class="sub">Subscribe</div>
  <div class="menu">≡</div>
</div>

<!-- center -->
<div class="center">
  How can I help you?
</div>

<!-- bottom -->
<div class="bottom">
  <div class="inputBox">
    <div class="icon">🎤</div>
    <input placeholder="Ask ChatGPT">
    <div class="icon">＋</div>
  </div>
</div>

</body>
</html>
