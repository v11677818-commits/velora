<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Velora Chat</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
height:100vh;
}

.container{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
position:relative;
}

.topbar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.menu-btn{
width:52px;
height:52px;
border-radius:50%;
background:#151515;
border:1px solid #2b2b2b;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.2s;
}

.menu-btn:hover{
background:#1d1d1d;
}

.menu-btn span{
font-size:28px;
color:white;
margin-top:-2px;
}

.subscribe-btn{
height:52px;
padding:0 24px;
border-radius:30px;
border:1px solid #2d2d2d;
background:#151515;
color:white;
font-size:15px;
cursor:pointer;
}

.sidebar{
position:fixed;
top:0;
left:-310px;
width:310px;
height:100vh;
background:#0b0b0b;
border-right:1px solid #1e1e1e;
padding:100px 28px;
transition:.35s;
z-index:999;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
font-size:20px;
margin-bottom:34px;
font-weight:500;
transition:.2s;
}

.sidebar a:hover{
opacity:.7;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:998;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.chat-area{
flex:1;
overflow-y:auto;
padding:
130px 18px
170px;
scroll-behavior:smooth;
}

.center-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
font-weight:600;
color:white;
text-align:center;
opacity:.95;
pointer-events:none;
}

.messages{
max-width:900px;
margin:auto;
display:flex;
flex-direction:column;
gap:18px;
}

.message{
max-width:78%;
padding:16px 18px;
border-radius:24px;
font-size:16px;
line-height:1.6;
word-wrap:break-word;
}

.user{
align-self:flex-end;
background:#1f1f1f;
border-bottom-right-radius:8px;
}

.bot{
align-self:flex-start;
background:#111;
border:1px solid #242424;
border-bottom-left-radius:8px;
}

.message img{
width:100%;
border-radius:18px;
margin-top:10px;
}

.bottom-bar{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
width:95%;
max-width:920px;
background:#171717;
border:1px solid #2a2a2a;
border-radius:36px;
padding:12px 14px;
display:flex;
align-items:center;
gap:12px;
z-index:100;
}

.upload-btn{
width:48px;
height:48px;
border-radius:50%;
background:#202020;
border:none;
color:white;
font-size:28px;
cursor:pointer;
flex-shrink:0;
}

.input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
}

.input::placeholder{
color:#8e8e8e;
}

.send-btn{
width:48px;
height:48px;
border-radius:50%;
background:white;
color:black;
border:none;
font-size:20px;
cursor:pointer;
font-weight:600;
flex-shrink:0;
}

.preview{
max-width:900px;
margin:auto;
margin-bottom:16px;
display:none;
}

.preview img{
width:120px;
border-radius:18px;
border:1px solid #2a2a2a;
}

@media(max-width:768px){

.center-text{
font-size:26px;
width:100%;
padding:0 20px;
}

.message{
max-width:88%;
font-size:15px;
}

.sidebar{
width:280px;
}

.bottom-bar{
bottom:14px;
width:94%;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">

<button class="subscribe-btn">
Subscribe
</button>

<div class="menu-btn" onclick="openMenu()">
<span>☰</span>
</div>

</div>

<div class="sidebar" id="sidebar">

<a href="group.html">Group</a>

<a href="chat.html">Bot</a>

<a href="game.html">Velora Game</a>

<a href="styles.html">Outfits</a>

<a href="challenges.html">Weekly Challenges</a>

<a href="store.html">Velora Store</a>

<a href="subscription.html">Subscription</a>

<a href="profile.html">Profile</a>

<a href="create.html">Create Group</a>

</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="chat-area" id="chatArea">

<div class="center-text" id="welcomeText">
How can I help you?
</div>

<div class="preview" id="preview">
<img id="previewImg">
</div>

<div class="messages" id="messages"></div>

</div>

<div class="bottom-bar">

<input
type="file"
id="imageInput"
accept="image/*"
hidden
>

<button class="upload-btn" id="uploadButton">
+
</button>

<input
type="text"
class="input"
id="messageInput"
placeholder="Ask Velora"
>

<button class="send-btn" id="sendButton">
↑
</button>

</div>

</div>

<script>

const sidebar =
document.getElementById("sidebar");

const overlay =
document.getElementById("overlay");

function openMenu(){
sidebar.classList.add("active");
overlay.classList.add("active");
}

function closeMenu(){
sidebar.classList.remove("active");
overlay.classList.remove("active");
}

const uploadButton =
document.getElementById("uploadButton");

const imageInput =
document.getElementById("imageInput");

const preview =
document.getElementById("preview");

const previewImg =
document.getElementById("previewImg");

const sendButton =
document.getElementById("sendButton");

const messageInput =
document.getElementById("messageInput");

const messages =
document.getElementById("messages");

const welcomeText =
document.getElementById("welcomeText");

let selectedImage = null;

let role = "registered";

/*
guest = 6
registered = 21
subscriber = unlimited
*/

let messageLimit = {
guest:6,
registered:21,
subscriber:999999
};

let messagesSent = 0;

uploadButton.onclick = () => {

if(role === "guest"){
alert("Guests cannot send images");
return;
}

imageInput.click();

};

imageInput.addEventListener("change",(e)=>{

const file = e.target.files[0];

if(!file) return;

selectedImage = file;

const reader = new FileReader();

reader.onload = function(event){

preview.style.display = "block";

previewImg.src = event.target.result;

};

reader.readAsDataURL(file);

});

function createMessage(type,text,image=null){

const div =
document.createElement("div");

div.className =
`message ${type}`;

let html = "";

if(text){
html += `<div>${text}</div>`;
}

if(image){
html += `<img src="${image}">`;
}

div.innerHTML = html;

messages.appendChild(div);

messages.scrollTop =
messages.scrollHeight;

document
.getElementById("chatArea")
.scrollTop =
document
.getElementById("chatArea")
.scrollHeight;

}

function botReply(){

setTimeout(()=>{

createMessage(
"bot",
"Velora AI response..."
);

},900);

}

function sendMessage(){

const text =
messageInput.value.trim();

if(!text && !selectedImage) return;

if(messagesSent >= messageLimit[role]){

alert("Message limit reached");

return;

}

messagesSent++;

welcomeText.style.display = "none";

if(selectedImage){

const reader = new FileReader();

reader.onload = function(event){

createMessage(
"user",
text,
event.target.result
);

botReply();

};

reader.readAsDataURL(selectedImage);

}else{

createMessage(
"user",
text
);

botReply();

}

messageInput.value = "";

selectedImage = null;

preview.style.display = "none";

imageInput.value = "";

}

sendButton.onclick = sendMessage;

messageInput.addEventListener("keypress",(e)=>{

if(e.key === "Enter"){
sendMessage();
}

});

</script>

</body>
</html>
