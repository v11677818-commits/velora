<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Velora</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
width:100%;
}

.sidebar{
position:fixed;
top:0;
left:-320px;
width:320px;
height:100%;
background:#0a0a0a;
border-right:1px solid #1f1f1f;
padding:25px;
transition:.3s;
z-index:999;
overflow-y:auto;
}

.sidebar.active{
left:0;
}

.sidebar-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
}

.sidebar-title{
font-size:24px;
font-weight:600;
}

.close-btn{
background:none;
border:none;
color:#fff;
font-size:30px;
cursor:pointer;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
text-decoration:none;
color:#fff;
background:#111;
padding:16px;
border-radius:18px;
font-size:16px;
transition:.2s;
border:1px solid #1c1c1c;
}

.menu a:hover{
background:#171717;
}

.main{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
position:relative;
}

.topbar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.menu-btn{
width:54px;
height:54px;
border-radius:50%;
border:none;
background:#171717;
color:#fff;
font-size:24px;
cursor:pointer;
}

.subscribe-btn{
background:#171717;
border:1px solid #2b2b2b;
color:#fff;
padding:16px 28px;
border-radius:40px;
font-size:15px;
cursor:pointer;
}

.chat-center{
flex:1;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.chat-center h1{
font-size:42px;
font-weight:600;
color:#fff;
}

.bottom-bar{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
width:95%;
max-width:900px;
}

.input-container{
background:#111;
border:1px solid #262626;
border-radius:40px;
height:72px;
display:flex;
align-items:center;
padding:0 16px;
gap:12px;
}

.voice-btn,
.upload-btn,
.send-btn{
width:46px;
height:46px;
border-radius:50%;
border:none;
background:#1b1b1b;
color:#fff;
font-size:18px;
cursor:pointer;
flex-shrink:0;
}

.chat-input{
flex:1;
height:100%;
background:transparent;
border:none;
outline:none;
color:#fff;
font-size:16px;
padding:0 10px;
}

.chat-input::placeholder{
color:#8d8d8d;
}

.hidden{
display:none;
}

@media(max-width:768px){

.chat-center h1{
font-size:28px;
}

.bottom-bar{
width:92%;
}

.input-container{
height:66px;
}

.sidebar{
width:280px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="sidebar" id="sidebar">

<div class="sidebar-top">
<div class="sidebar-title">Velora</div>

<button class="close-btn" onclick="closeMenu()">
×
</button>
</div>

<div class="menu">

<a href="group.html">Group</a>

<a href="chat.html">Bot</a>

<a href="game.html">Velora Game</a>

<a href="styles.html">Styles</a>

<a href="challenges.html">Weekly Challenges</a>

<a href="store.html">Velora Store</a>

<a href="subscription.html">Subscription</a>

<a href="profile.html">Profile</a>

<a href="create.html">Create Group</a>

</div>
</div>

<div class="main">

<div class="topbar">

<button class="menu-btn" onclick="openMenu()">
☰
</button>

<button class="subscribe-btn">
Subscribe
</button>

</div>

<div class="chat-center">
<h1>How can I help you?</h1>
</div>

<div class="bottom-bar">

<div class="input-container">

<button class="voice-btn">
⌁
</button>

<label class="upload-btn">
+
<input type="file" id="imageUpload" class="hidden">
</label>

<input
type="text"
class="chat-input"
placeholder="Ask Velora"
/>

<button class="send-btn">
↑
</button>

</div>

</div>

</div>

</div>

<script>

function openMenu(){
document.getElementById("sidebar").classList.add("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
}

const uploadInput = document.getElementById("imageUpload");

uploadInput.addEventListener("change", function(){

const userType = "registered";

/*
guest
registered
subscriber
*/

if(userType === "guest"){
alert("Guests cannot upload images");
uploadInput.value = "";
return;
}

const file = this.files[0];

if(file){
console.log("Image Selected:", file.name);
}

});

let messageCount = 0;

const userType = "registered";

/*
guest = 6
registered = 21
subscriber = unlimited
*/

document.querySelector(".send-btn").addEventListener("click", ()=>{

if(userType === "guest" && messageCount >= 6){
alert("Guest limit reached");
return;
}

if(userType === "registered" && messageCount >= 21){
alert("Registered user limit reached");
return;
}

messageCount++;

console.log("Message Sent");

});

</script>

</body>
</html>
