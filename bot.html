<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velora Bot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* top bar */
.topBar {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 10px;
}

.subBtn {
    padding: 10px 18px;
    background: #1c1c1e;
    border-radius: 25px;
    border: none;
    color: white;
    cursor: pointer;
}

.menuBtn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #1c1c1e;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* center text */
.centerText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
}

/* input bar */
.inputBar {
    position: fixed;
    bottom: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.input {
    flex: 1;
    padding: 14px;
    border-radius: 25px;
    border: none;
    outline: none;
    background: #1c1c1e;
    color: white;
}

.plus {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: #1c1c1e;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

/* sidebar */
.sidebar {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: #111;
    padding: 20px;
    transition: 0.3s;
}

.sidebar.active {
    right: 0;
}

.item {
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 10px;
    cursor: pointer;
}

.item:hover {
    background: #1c1c1e;
}
</style>

</head>

<body>

<!-- top -->
<div class="topBar">
    <button class="subBtn">Subscription</button>
    <button class="menuBtn" onclick="toggleMenu()">☰</button>
</div>

<!-- center -->
<div class="centerText">
    How can I help you?
</div>

<!-- bottom -->
<div class="inputBar">
    <input class="input" id="msg" placeholder="Ask Velora">
    <button class="plus">+</button>
</div>

<!-- sidebar -->
<div class="sidebar" id="sidebar">

    <div class="item">Group Chat</div>
    <div class="item">Private Groups</div>
    <div class="item">Game</div>
    <div class="item">Themes</div>
    <div class="item">Challenges</div>
    <div class="item">Leaderboard</div>
    <div class="item">Store</div>
    <div class="item">Subscription</div>
    <div class="item">Profile</div>

</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}
</script>
