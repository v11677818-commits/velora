<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Group | Velora</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#F7F7FC;

color:#202124;

}

.container{

width:100%;
max-width:430px;

margin:40px auto;

background:#fff;

padding:28px;

border-radius:28px;

box-shadow:0 15px 40px rgba(0,0,0,.08);

}

h1{

text-align:center;

font-size:30px;

font-weight:700;

margin-bottom:28px;

}

.group-image{

text-align:center;

margin-bottom:30px;

}

.image-circle{

width:130px;

height:130px;

margin:auto;

border-radius:50%;

background:#F2EEFF;

border:3px solid #7C5CFC;

display:flex;

justify-content:center;

align-items:center;

font-size:42px;

cursor:pointer;

overflow:hidden;

}

.group-image p{

margin-top:12px;

color:#7C5CFC;

font-weight:600;

cursor:pointer;

}

.field{

margin-bottom:22px;

}

.field label{

display:block;

margin-bottom:10px;

font-weight:600;

}

.field input,

.field textarea{

width:100%;

padding:15px;

border:1.8px solid #E8E8EF;

border-radius:18px;

font-size:15px;

outline:none;

}

.field input:focus,

.field textarea:focus{

border-color:#7C5CFC;

}

.field textarea{

height:120px;

resize:none;

}

#inviteSection{

display:none;

margin-bottom:22px;

}

#inviteSection input{

width:100%;

padding:15px;

border:1.8px solid #E8E8EF;

border-radius:18px;

margin-top:10px;

margin-bottom:12px;

}

#copyLink,

#newLink{

width:49%;

padding:14px;

border:none;

border-radius:16px;

background:#7C5CFC;

color:white;

font-weight:600;

cursor:pointer;

}

#createGroup{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:#7C5CFC;

color:white;

font-size:17px;

font-weight:700;

cursor:pointer;

}

#createGroup:hover{

background:#6B49F5;

}

</style>
<body>

<div class="container">

<h1>Create Group</h1>

<div class="group-image">

<div class="image-circle">
📷
</div>

<p>Upload Group Image</p>

<input
type="file"
id="groupImage"
hidden
accept="image/*"
>

</div>

<div class="field">

<label>Group Name</label>

<input
type="text"
id="groupName"
placeholder="Enter group name..."
>

</div>

<div class="field">

<label>Description</label>

<textarea
id="groupDescription"
placeholder="Write about your group..."
></textarea>

</div>

<div class="field">

<label>Privacy</label>

<label>
<input
type="radio"
name="privacy"
value="public"
checked
>
Public
</label>

<label>
<input
type="radio"
name="privacy"
value="private"
>
Private
</label>

</div>

<div id="inviteSection">

<label>Invite Link</label>

<input
type="text"
id="inviteLink"
readonly
>

<button id="copyLink">
Copy Link
</button>

<button id="newLink">
Generate New Link
</button>

</div>

<div class="field">

<label>Maximum Members</label>

<input
type="number"
id="maxMembers"
placeholder="100"
>

</div>

<button id="createGroup">

Create Group

</button>

</div>
<script>

const imageCircle =
document.querySelector(".image-circle");

const groupImage =
document.getElementById("groupImage");

imageCircle.onclick=function(){

groupImage.click();

};

groupImage.onchange=function(){

const file=this.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

imageCircle.innerHTML=

`<img src="${e.target.result}"
style="
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
">`;

}

reader.readAsDataURL(file);

};

const inviteSection=

document.getElementById("inviteSection");

const privacy=

document.querySelectorAll("input[name='privacy']");

privacy.forEach(item=>{

item.onchange=function(){

inviteSection.style.display=

this.value==="private"

? "block"

: "none";

}

});

function randomCode(){

return Math.random()

.toString(36)

.substring(2,8)

.toUpperCase();

}

const inviteLink=

document.getElementById("inviteLink");

inviteLink.value=

"velora.app/group/"+randomCode();

document.getElementById("newLink").onclick=function(){

inviteLink.value=

"velora.app/group/"+randomCode();

};

document.getElementById("copyLink").onclick=function(){

navigator.clipboard.writeText(

inviteLink.value

);

alert("Invite link copied");

};

document.getElementById("createGroup").onclick=function(){

const name=

document.getElementById("groupName").value.trim();

if(name===""){

alert("Enter group name");

return;

}

alert("UI Completed ✅");

};

</script>
</body>

</html>
