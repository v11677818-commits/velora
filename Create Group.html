<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Group | Velora</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#F7F7FC;
display:flex;
justify-content:center;
padding:25px 15px;
}

.container{
width:100%;
max-width:430px;
}

.card{
background:#fff;
border-radius:28px;
padding:25px;
box-shadow:0 12px 30px rgba(0,0,0,.06);
}

.top-bar{
display:flex;
align-items:center;
margin-bottom:25px;
}

.back-btn{
border:none;
background:none;
font-size:26px;
cursor:pointer;
margin-right:12px;
}

.top-bar h1{
font-size:28px;
font-weight:700;
color:#202124;
}

.group-image{
text-align:center;
margin-bottom:25px;
}

.image-circle{
width:125px;
height:125px;
margin:auto;
border-radius:50%;
border:3px solid #7C5CFC;
background:#F4F0FF;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
cursor:pointer;
}

.image-circle img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.camera-icon{
font-size:34px;
}

.group-image p{
margin-top:12px;
font-size:15px;
font-weight:600;
color:#7C5CFC;
cursor:pointer;
}

.field{
margin-top:18px;
}

.field label{
display:block;
margin-bottom:8px;
font-size:15px;
font-weight:600;
color:#202124;
}

input,
textarea{
width:100%;
padding:15px;
border:1.8px solid #E7E7EE;
border-radius:16px;
outline:none;
font-size:15px;
}

textarea{
height:95px;
resize:none;
}

input:focus,
textarea:focus{
border-color:#7C5CFC;
}

.privacy{
display:flex;
gap:25px;
margin-top:8px;
}

.privacy label{
display:flex;
align-items:center;
gap:8px;
font-weight:500;
}

#inviteSection{
display:none;
margin-top:18px;
}

.invite-buttons{
display:flex;
gap:10px;
margin-top:12px;
}

.invite-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:14px;
background:#7C5CFC;
color:#fff;
font-weight:600;
cursor:pointer;
}

.create-btn{
width:100%;
margin-top:28px;
padding:16px;
border:none;
border-radius:18px;
background:#7C5CFC;
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.25s;
}

.create-btn:hover{
background:#6948F5;
}

  </style>
</head>

<body>

<div class="container">

<div class="card">

<div class="top-bar">

<button class="back-btn">

←

</button>

<h1>Create Group</h1>

</div>

<div class="group-image">

<div class="image-circle">

<img id="previewImage">

<span class="camera-icon">📷</span>

</div>

<p>Upload Group Image</p>

<input
type="file"
id="groupImage"
accept="image/*"
hidden>

</div>

<div class="field">

<label>Group Name</label>

<input
type="text"
id="groupName"
placeholder="Enter group name...">

</div>

<div class="field">

<label>Description</label>

<textarea
id="description"
placeholder="Write about your group..."></textarea>

</div>

<div class="field">

<label>Privacy</label>

<div class="privacy">

<label>

<input
type="radio"
name="privacy"
value="public"
checked>

Public

</label>

<label>

<input
type="radio"
name="privacy"
value="private">

Private

</label>

</div>

</div>

<div
id="inviteSection">

<label>Invite Link</label>

<input
type="text"
value="velora.app/group/X8K4PQ"
readonly>

<div class="invite-buttons">

<button>

Copy Link

</button>

<button>

Generate New Link

</button>

</div>

</div>

<div class="field">

<label>Maximum Members</label>

<input
type="number"
placeholder="Enter maximum number of members...">

</div>

<button
class="create-btn">

Create Group

</button>

</div>

</div>
<script>

const imageInput=document.getElementById("groupImage");
const preview=document.getElementById("previewImage");
const circle=document.querySelector(".image-circle");
const uploadText=document.querySelector(".group-image p");

circle.onclick=()=>imageInput.click();
uploadText.onclick=()=>imageInput.click();

imageInput.onchange=function(){

const file=this.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

preview.src=e.target.result;
preview.style.display="block";

const icon=document.querySelector(".camera-icon");

if(icon) icon.style.display="none";

}

reader.readAsDataURL(file);

}

const inviteSection=document.getElementById("inviteSection");

document.querySelectorAll("input[name='privacy']").forEach(r=>{

r.addEventListener("change",()=>{

if(document.querySelector("input[value='private']").checked){

inviteSection.style.display="block";

}else{

inviteSection.style.display="none";

}

});

});

  </script>
</body>
</html>
