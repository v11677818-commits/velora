<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Velora Battle</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:850px;
margin:auto;
background:#111;
padding:25px;
border-radius:24px;
}

.title{
font-size:34px;
font-weight:700;
text-align:center;
margin-bottom:25px;
}

.uploadBox{
width:100%;
height:320px;
border:2px dashed #444;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
overflow:hidden;
margin-bottom:20px;
background:#181818;
}

.uploadBox img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.uploadText{
font-size:22px;
color:#999;
}

input[type="text"],
textarea{
width:100%;
background:#1a1a1a;
border:none;
outline:none;
padding:16px;
border-radius:16px;
color:white;
margin-bottom:15px;
font-size:18px;
}

textarea{
height:140px;
resize:none;
}

.publishBtn{
width:100%;
height:65px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:700;
cursor:pointer;
background:white;
color:black;
transition:.2s;
}

.publishBtn:hover{
opacity:.9;
}

.battlePanel{
margin-top:25px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.battleCard{
background:#1a1a1a;
padding:18px;
border-radius:18px;
text-align:center;
}

.battleLabel{
font-size:14px;
color:#888;
margin-bottom:8px;
}

.battleValue{
font-size:22px;
font-weight:700;
}

.achievementBox{
margin-top:20px;
background:#1a1a1a;
padding:18px;
border-radius:18px;
}

.sectionTitle{
font-size:20px;
font-weight:700;
margin-bottom:12px;
}

.achievementItem{
padding:12px;
background:#242424;
border-radius:12px;
margin-bottom:10px;
}

.rewardBox{
margin-top:20px;
background:#1a1a1a;
padding:18px;
border-radius:18px;
text-align:center;
}

.rewardBtn{
width:100%;
height:55px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.vipBox{
margin-top:20px;
background:#1a1a1a;
padding:18px;
border-radius:18px;
}

.vipItem{
margin-bottom:8px;
color:#ccc;
}

@media(max-width:700px){

.battlePanel{
grid-template-columns:1fr;
}

.title{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
Velora Battle
</div>

<label class="uploadBox">

<input
type="file"
id="imageInput"
accept="image/*"
hidden
>

<img id="preview">

<div
class="uploadText"
id="uploadText"
>
Upload Design
</div>

</label>

<input
type="text"
id="designName"
placeholder="Design Name"
>

<textarea
id="designDescription"
placeholder="Design Description"
></textarea>

<button
class="publishBtn"
id="publishBtn"
>
Publish
</button>

<div class="battlePanel">

<div class="battleCard">
<div class="battleLabel">👑 Rank</div>
<div class="battleValue" id="battleRank">
Beginner
</div>
</div>

<div class="battleCard">
<div class="battleLabel">⭐ XP</div>
<div class="battleValue" id="battleXP">
0
</div>
</div>

<div class="battleCard">
<div class="battleLabel">🔥 Streak</div>
<div class="battleValue" id="battleStreak">
0
</div>
</div>

<div class="battleCard">
<div class="battleLabel">📊 Posts</div>
<div class="battleValue" id="battlePosts">
0
</div>
</div>

</div>

<div class="achievementBox">

<div class="sectionTitle">
🏅 Achievements
</div>

<div
class="achievementItem"
id="achievementText"
>
No Achievements Yet
</div>

</div>

<div class="rewardBox">

<div class="sectionTitle">
🎁 Reward Box
</div>

<button
class="rewardBtn"
id="rewardBtn"
>
Locked
</button>

</div>

<div class="vipBox">

<div class="sectionTitle">
💎 VIP Benefits
</div>

<div class="vipItem">
+20% XP
</div>

<div class="vipItem">
VIP Badge
</div>

<div class="vipItem">
VIP Frame
</div>

<div class="vipItem">
Weekly VIP Box
</div>

</div>

</div>

<script>

/* PART 2 COMING */
let imageData = "";

let battleXP =
parseInt(
localStorage.getItem(
"battleXP"
)
) || 0;

let battlePosts =
parseInt(
localStorage.getItem(
"battlePosts"
)
) || 0;

let battleStreak =
parseInt(
localStorage.getItem(
"battleStreak"
)
) || 0;

let achievements =
JSON.parse(
localStorage.getItem(
"battleAchievements"
)
) || [];

const imageInput =
document.getElementById(
"imageInput"
);

const preview =
document.getElementById(
"preview"
);

const uploadText =
document.getElementById(
"uploadText"
);

imageInput.addEventListener(
"change",
function(e){

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(event){

imageData =
event.target.result;

preview.src =
imageData;

preview.style.display =
"block";

uploadText.style.display =
"none";

};

reader.readAsDataURL(
file
);

}
);

function updateBattleUI(){

document.getElementById(
"battleXP"
).innerText =
battleXP;

document.getElementById(
"battlePosts"
).innerText =
battlePosts;

document.getElementById(
"battleStreak"
).innerText =
battleStreak;

let rank =
"Beginner";

if(
battleXP >= 10000
){
rank = "Queen";
}
else if(
battleXP >= 4000
){
rank = "Legendary";
}
else if(
battleXP >= 2000
){
rank = "Professional";
}
else if(
battleXP >= 1000
){
rank = "Designer";
}

document.getElementById(
"battleRank"
).innerText =
rank;

if(
achievements.length > 0
){

document.getElementById(
"achievementText"
).innerHTML =
achievements.join("<br>");

}

if(
battlePosts >= 5
){

document.getElementById(
"rewardBtn"
).innerText =
"🎁 Open Reward Box";

}

}

updateBattleUI();

document
.getElementById(
"rewardBtn"
)
.onclick = ()=>{

if(
battlePosts < 5
){
return;
}

const rewards = [

"💰 100 Coins",

"🏷️ New Title",

"🖼️ Profile Picture",

"✨ Special Frame",

"🎖️ Battle Badge"

];

const reward =

rewards[
Math.floor(
Math.random() *
rewards.length
)
];

alert(
reward
);

};

document
.getElementById(
"publishBtn"
)
.onclick = ()=>{

const name =
document
.getElementById(
"designName"
)
.value;

const description =
document
.getElementById(
"designDescription"
)
.value;

if(
!imageData ||
!name ||
!description
){

alert(
"Complete All Fields"
);

return;

}

const battlePost = {

image:imageData,

name:name,

description:description,

votes:0,

createdAt:
Date.now()

};

let posts =
JSON.parse(
localStorage.getItem(
"veloraBattlePosts"
)
) || [];

posts.push(
battlePost
);

localStorage.setItem(
"veloraBattlePosts",
JSON.stringify(
posts
)
);

battleXP += 25;

battlePosts++;

localStorage.setItem(
"battleXP",
battleXP
);

localStorage.setItem(
"battlePosts",
battlePosts
);

if(
battlePosts === 1 &&
!achievements.includes(
"🥉 First Design"
)
){

achievements.push(
"🥉 First Design"
);

}

if(
battlePosts === 10 &&
!achievements.includes(
"🥈 10 Designs"
)
){

achievements.push(
"🥈 10 Designs"
);

}

if(
battlePosts === 50 &&
!achievements.includes(
"🥇 50 Designs"
)
){

achievements.push(
"🥇 50 Designs"
);

}

localStorage.setItem(
"battleAchievements",
JSON.stringify(
achievements
)
);

updateBattleUI();

alert(
"Published Successfully +25 XP"
);

};
 /* =========================
   EXTRA BATTLE SYSTEM
========================= */

let battleWins =
parseInt(
localStorage.getItem(
"battleWins"
)
) || 0;

let battleVotes =
parseInt(
localStorage.getItem(
"battleVotes"
)
) || 0;

localStorage.setItem(
"battleWins",
battleWins
);

localStorage.setItem(
"battleVotes",
battleVotes
);

/* ADD THESE INSIDE updateBattleUI() */

if(
battlePosts >= 100 &&
!achievements.includes(
"👑 100 Designs"
)
){

achievements.push(
"👑 100 Designs"
);

}

localStorage.setItem(
"battleAchievements",
JSON.stringify(
achievements
)
);

/* VICTORY EFFECT */

function showVictory(){

const popup =
document.createElement(
"div"
);

popup.innerHTML =
"🎉 Victory";

popup.style.position =
"fixed";

popup.style.top =
"50%";

popup.style.left =
"50%";

popup.style.transform =
"translate(-50%,-50%)";

popup.style.background =
"#111";

popup.style.padding =
"30px";

popup.style.borderRadius =
"20px";

popup.style.fontSize =
"32px";

popup.style.zIndex =
"9999";

document.body.appendChild(
popup
);

setTimeout(()=>{

popup.remove();

},2000);

}

/* ACHIEVEMENT EFFECT */

function showAchievement(
text
){

const popup =
document.createElement(
"div"
);

popup.innerHTML =
"🏅 " + text;

popup.style.position =
"fixed";

popup.style.top =
"20px";

popup.style.left =
"50%";

popup.style.transform =
"translateX(-50%)";

popup.style.background =
"#222";

popup.style.padding =
"18px";

popup.style.borderRadius =
"14px";

popup.style.zIndex =
"9999";

document.body.appendChild(
popup
);

setTimeout(()=>{

popup.remove();

},2500);

}

/* PROFILE DATA */

window.veloraBattle = {

xp:()=>battleXP,

posts:()=>battlePosts,

wins:()=>battleWins,

votes:()=>battleVotes,

streak:()=>battleStreak,

achievements:()=>achievements

};
  /* =========================
   TOP 10 LEADERBOARD
========================= */

function getLeaderboard(){

let board =
JSON.parse(
localStorage.getItem(
"veloraLeaderboard"
)
) || [];

return board;

}

function saveToLeaderboard(){

let board =
getLeaderboard();

board.push({

name:
document.getElementById(
"designName"
).value,

xp:battleXP,

posts:battlePosts,

date:Date.now()

});

board.sort(
(a,b)=>
b.xp - a.xp
);

board =
board.slice(0,10);

localStorage.setItem(
"veloraLeaderboard",
JSON.stringify(
board
)
);

}

/* ADD INSIDE PUBLISH BUTTON */

saveToLeaderboard();

/* =========================
   VIP SYSTEM
========================= */

let isVIP =
localStorage.getItem(
"isVIP"
) === "true";

if(isVIP){

battleXP += 5;

}

/* =========================
   WIN RATE
========================= */

function getWinRate(){

if(
battlePosts === 0
){
return "0%";
}

return Math.floor(

(battleWins /
battlePosts)

* 100

) + "%";

}

/* =========================
   STREAK REWARDS
========================= */

if(
battleStreak === 5
){

showAchievement(
"🔥 Streak x5"
);

}

if(
battleStreak === 10
){

showAchievement(
"🔥 Streak x10"
);

}

/* =========================
   RANK CELEBRATIONS
========================= */

if(
battleXP === 1000
){

alert(
"🥈 Designer Unlocked"
);

}

if(
battleXP === 2000
){

alert(
"🥇 Professional Unlocked"
);

}

if(
battleXP === 4000
){

alert(
"💎 Legendary Unlocked"
);

}

if(
battleXP === 10000
){

alert(
"👑 Queen Unlocked"
);

            } 
</script>

</body>
</html>
