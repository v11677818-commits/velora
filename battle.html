<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Velora Battle</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:#111;
padding:25px;
border-radius:24px;
}

.title{
font-size:32px;
font-weight:700;
margin-bottom:25px;
text-align:center;
}

.uploadBox{
width:100%;
height:320px;
border:2px dashed #444;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
overflow:hidden;
margin-bottom:20px;
}

.uploadBox img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.uploadText{
font-size:22px;
color:#999;
}

input[type="text"],
textarea{
width:100%;
background:#1a1a1a;
border:none;
outline:none;
padding:16px;
border-radius:16px;
color:white;
margin-bottom:15px;
font-size:18px;
}

textarea{
height:140px;
resize:none;
}

.publishBtn{
width:100%;
height:65px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:700;
cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<div class="title">
Velora Battle
</div>

<label class="uploadBox">

<input
type="file"
id="imageInput"
accept="image/*"
hidden
>

<img id="preview">

<div class="uploadText" id="uploadText">
Upload Design
</div>

</label>

<input
type="text"
id="designName"
placeholder="Design Name"
>

<textarea
id="designDescription"
placeholder="Design Description"
></textarea>

<button
class="publishBtn"
id="publishBtn"
>
Publish
</button>

</div>

<script>

let imageData = "";

const imageInput =
document.getElementById("imageInput");

const preview =
document.getElementById("preview");

const uploadText =
document.getElementById("uploadText");

imageInput.addEventListener(
"change",
function(e){

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(event){

imageData =
event.target.result;

preview.src =
imageData;

preview.style.display =
"block";

uploadText.style.display =
"none";

};

reader.readAsDataURL(file);

}
);

document
.getElementById("publishBtn")
.onclick = ()=>{

const name =
document
.getElementById("designName")
.value;

const description =
document
.getElementById("designDescription")
.value;

if(
!imageData ||
!name ||
!description
){

alert(
"Complete All Fields"
);

return;

}

const battlePost = {

image:imageData,

name:name,

description:description,

votes:0,

createdAt:
Date.now()

};

let posts =
JSON.parse(
localStorage.getItem(
"veloraBattlePosts"
)
) || [];

posts.push(
battlePost
);

localStorage.setItem(
"veloraBattlePosts",
JSON.stringify(posts)
);

alert(
"Published Successfully"
);

};

</script>

</body>
</html>
