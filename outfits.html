<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velora Outfits</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
height:100vh;
}

/* APP */

.app{
width:100%;
height:100vh;
display:flex;
position:relative;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-320px;
width:320px;
height:100vh;
background:#0b0b0b;
border-right:1px solid #1f1f1f;
padding:100px 28px;
transition:.35s;
z-index:999;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
font-size:20px;
margin-bottom:34px;
font-weight:500;
transition:.2s;
}

.sidebar a:hover{
opacity:.7;
}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:998;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* TOPBAR */

.topbar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.menu-btn{
width:52px;
height:52px;
border-radius:50%;
background:#151515;
border:1px solid #2b2b2b;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:26px;
}

.page-title{
font-size:28px;
font-weight:600;
}

/* MAIN */

.main{
flex:1;
overflow-y:auto;
padding:
120px 20px
220px;
}

/* HERO */

.hero{
max-width:1350px;
margin:auto;
position:relative;
}

/* GLOW */

.glow{
position:absolute;
top:120px;
left:50%;
transform:translateX(-50%);
width:700px;
height:700px;
background:
radial-gradient(
circle,
rgba(255,255,255,.07),
transparent
);
filter:blur(90px);
pointer-events:none;
}

/* CAMERA */

.camera-wrap{
display:flex;
justify-content:center;
margin-bottom:42px;
position:relative;
z-index:2;
}

.camera-btn{
width:120px;
height:120px;
border-radius:50%;
background:#111;
border:1px solid #262626;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.2s;
}

.camera-btn:hover{
background:#1a1a1a;
transform:scale(1.03);
}

.camera{
width:52px;
height:40px;
border:3px solid white;
border-radius:14px;
position:relative;
}

.camera::before{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:16px;
height:16px;
border:3px solid white;
border-radius:50%;
}

.camera::after{
content:"";
position:absolute;
top:-12px;
left:8px;
width:18px;
height:10px;
background:white;
border-radius:10px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(240px,1fr));
gap:22px;
position:relative;
z-index:2;
}

/* CARD */

.card{
position:relative;
height:340px;
border-radius:34px;
overflow:hidden;
background:#111;
border:1px solid #242424;
box-shadow:
0 0 30px rgba(255,255,255,.03);
animation:fade .4s ease;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* REMOVE */

.remove-btn{
position:absolute;
top:14px;
right:14px;
width:38px;
height:38px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.5);
backdrop-filter:blur(10px);
color:white;
font-size:22px;
cursor:pointer;
}

/* AI PANEL */

.ai-panel{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:95%;
max-width:1050px;
background:rgba(17,17,17,.9);
backdrop-filter:blur(18px);
border:1px solid #2b2b2b;
border-radius:34px;
padding:18px;
z-index:100;
}

/* INPUT */

.input-row{
display:flex;
gap:14px;
align-items:flex-end;
}

.input{
flex:1;
background:#191919;
border:none;
outline:none;
border-radius:26px;
padding:18px;
color:white;
font-size:15px;
resize:none;
min-height:58px;
max-height:180px;
line-height:1.7;
}

.input::placeholder{
color:#8e8e8e;
}

/* SEND */

.send-btn{
width:58px;
height:58px;
border:none;
border-radius:50%;
background:white;
color:black;
font-size:22px;
font-weight:600;
cursor:pointer;
flex-shrink:0;
}

/* RESPONSE */

.response{
margin-top:18px;
background:#171717;
border:1px solid #292929;
border-radius:28px;
padding:24px;
display:none;
animation:fade .4s ease;
}

.response-title{
font-size:17px;
font-weight:600;
margin-bottom:14px;
}

.response-text{
font-size:15px;
line-height:2;
color:#d6d6d6;
}

/* LOADING */

.loading{
display:none;
margin-top:18px;
font-size:14px;
color:#a0a0a0;
}

/* FLOATING */

.particles{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.particles span{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.1;
animation:float 14s linear infinite;
}

/* ANIMATION */

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:.1;
}

100%{
transform:translateY(-100px);
opacity:0;
}

}

/* MOBILE */

@media(max-width:768px){

.sidebar{
width:280px;
}

.page-title{
font-size:22px;
}

.camera-btn{
width:95px;
height:95px;
}

.grid{
grid-template-columns:
repeat(2,1fr);
gap:16px;
}

.card{
height:240px;
border-radius:24px;
}

.ai-panel{
width:94%;
bottom:12px;
padding:14px;
}

.input{
font-size:14px;
padding:16px;
}

.response{
padding:18px;
}

}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<a href="group.html">Group</a>

<a href="chat.html">Bot</a>

<a href="game.html">Velora Game</a>

<a href="outfits.html">Outfits</a>

<a href="challenges.html">Weekly Challenges</a>

<a href="store.html">Velora Store</a>

<a href="subscription.html">Subscription</a>

<a href="profile.html">Profile</a>

<a href="create.html">Create Group</a>

</div>

<div
class="overlay"
id="overlay"
onclick="closeMenu()"
></div>

<!-- TOP -->

<div class="topbar">

<div
class="menu-btn"
onclick="openMenu()"
>
☰
</div>

<div class="page-title">
Outfits
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="hero">

<div class="glow"></div>

<div class="particles">

<span style="left:10%;animation-delay:0s"></span>
<span style="left:20%;animation-delay:2s"></span>
<span style="left:40%;animation-delay:4s"></span>
<span style="left:60%;animation-delay:1s"></span>
<span style="left:80%;animation-delay:5s"></span>

</div>

<!-- CAMERA -->

<div class="camera-wrap">

<label class="camera-btn">

<div class="camera"></div>

<input
type="file"
id="uploadInput"
accept="image/*"
multiple
hidden
>

</label>

</div>

<!-- GRID -->

<div class="grid" id="grid"></div>

</div>

</div>

<!-- AI -->

<div class="ai-panel">

<div class="input-row">

<textarea
class="input"
id="promptInput"
placeholder="Describe your outfit style"
></textarea>

<button
class="send-btn"
id="sendBtn"
>
↑
</button>

</div>

<div
class="loading"
id="loading"
>
Analyzing uploaded outfits...
</div>

<div
class="response"
id="response"
>

<div class="response-title">
Velora AI Stylist
</div>

<div
class="response-text"
id="responseText"
></div>

</div>

</div>

</div>

<script>

/* SIDEBAR */

const sidebar =
document.getElementById("sidebar");

const overlay =
document.getElementById("overlay");

function openMenu(){

sidebar.classList.add("active");

overlay.classList.add("active");

}

function closeMenu(){

sidebar.classList.remove("active");

overlay.classList.remove("active");

}

/* ROLE */

let role = "subscriber";

/*

guest
registered
subscriber

*/

let analysisCount = 0;

/* IMAGES */

const uploadInput =
document.getElementById("uploadInput");

const grid =
document.getElementById("grid");

let images = [];

uploadInput.addEventListener("change",(e)=>{

const files = [...e.target.files];

files.forEach(file=>{

const reader =
new FileReader();

reader.onload = function(event){

images.push(
event.target.result
);

renderImages();

};

reader.readAsDataURL(file);

});

});

function renderImages(){

grid.innerHTML = "";

images.forEach((img,index)=>{

grid.innerHTML += `

<div class="card">

<img src="${img}">

<button
class="remove-btn"
onclick="removeImage(${index})"
>
×
</button>

</div>

`;

});

}

function removeImage(index){

images.splice(index,1);

renderImages();

}

/* AI */

const sendBtn =
document.getElementById("sendBtn");

const loading =
document.getElementById("loading");

const response =
document.getElementById("response");

const responseText =
document.getElementById("responseText");

sendBtn.onclick = ()=>{

if(role === "guest"){

alert(
"Guests cannot use outfit analysis"
);

return;

}

if(role === "registered" &&
analysisCount >= 2){

alert(
"Analysis limit reached"
);

return;

}

if(images.length === 0){

alert(
"Upload outfit images first"
);

return;

}

analysisCount++;

loading.style.display = "block";

response.style.display = "none";

setTimeout(()=>{

loading.style.display = "none";

response.style.display = "block";

responseText.innerHTML = `

Your uploaded outfits create a clean luxury aesthetic with balanced layering and soft tones.

Recommended outfit styling:

- Oversized black blazer
- White fitted top
- Straight fit jeans
- Silver jewelry
- Soft glam makeup
- White sneakers or heels

Suggested style:
Modern Korean Luxury

`;

},2500);

};

</script>

</body>
</html>
